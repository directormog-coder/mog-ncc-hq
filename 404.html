<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>SIGNAL LOST | 404 ERROR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(212, 175, 55, 0.15); backdrop-filter: blur(15px); }
        .terminal-font { font-family: 'JetBrains Mono', monospace; }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col items-center justify-center p-10 text-center">

    <div class="glass p-10 rounded-[3rem] border-red-900/40 relative overflow-hidden max-w-xs w-full">
        <i data-lucide="unplug" class="mx-auto mb-6 text-red-600 animate-pulse" size="48"></i>
        
        <h1 class="text-4xl font-black text-white italic mb-2 glitch">404</h1>
        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-red-500 mb-6">Signal Terminated</p>
        
        <div class="space-y-4 text-[9px] terminal-font uppercase text-gold/40 mb-8 leading-relaxed">
            <p>[ERROR]: Requested frequency not found.</p>
            <p>[STATUS]: Operative out of bounds.</p>
        </div>

        <button onclick="window.location.href='index.html'" class="w-full py-4 bg-gold text-black font-black text-[10px] uppercase rounded-full shadow-lg active:scale-95 transition-all">
            Return to Grid
        </button>
    </div>

    <footer class="fixed bottom-10 opacity-20">
        <p class="terminal-font text-[7px] font-black uppercase tracking-widest">Ministry of Groove | Unauthorized Zone</p>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
