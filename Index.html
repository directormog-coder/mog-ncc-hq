<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY OF GROOVE | NCC BYPASS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.2); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="ministry()" x-init="init()" x-cloak class="min-h-screen">

    <template x-if="view === 'auth'">
        <div class="h-screen flex flex-col items-center justify-center p-6 bg-black text-center">
            <img src="logo.png" class="h-32 w-32 mb-6 animate-pulse" @click="bypass()">
            <h1 class="text-white text-2xl font-black uppercase tracking-widest mb-2">Ministry of Groove</h1>
            
            <div class="max-w-xs w-full mt-8 space-y-4">
                <button @click="bypass()" class="w-full py-4 bg-gold text-black font-black text-[10px] uppercase rounded-xl">
                    Manual Override (Bypass)
                </button>
                <p class="text-[8px] text-zinc-500 uppercase tracking-widest">Tap logo or button to enter</p>
            </div>
        </div>
    </template>

    <template x-if="view === 'grid'">
        <div class="flex flex-col min-h-screen">
            <header class="p-6 border-b border-gold/10 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img src="logo.png" class="h-8 w-8">
                    <span class="text-[10px] font-black uppercase text-white" x-text="'OPERATIVE: ' + username"></span>
                </div>
                <button @click="location.reload()" class="text-[8px] text-red-500 font-black uppercase">Exit</button>
            </header>

            <main class="p-6 flex-grow max-w-lg mx-auto w-full">
                <div class="glass rounded-3xl h-[450px] flex flex-col overflow-hidden">
                    <div id="chat-stream" class="flex-grow overflow-y-auto p-4 space-y-3">
                        <template x-for="msg in messages" :key="msg.id">
                            <div class="p-3 rounded-lg bg-white/5 border-l-2 border-gold/30">
                                <p class="text-[7px] font-bold text-gold uppercase" x-text="msg.username"></p>
                                <p class="text-xs text-zinc-200" x-text="msg.content"></p>
                            </div>
                        </template>
                    </div>
                    
                    <form @submit.prevent="send()" class="p-3 border-t border-gold/10 flex gap-2">
                        <input x-model="msgInput" placeholder="TYPE MESSAGE..." class="flex-grow bg-black/50 text-white text-xs p-3 rounded-xl outline-none border border-white/5">
                        <button type="submit" class="bg-gold text-black px-4 rounded-xl font-bold text-[10px]">SEND</button>
                    </form>
                </div>
            </main>
        </div>
    </template>

    <script>
        function ministry() {
            return {
                view: 'auth',
                username: 'GUEST_PROX',
                messages: [],
                msgInput: '',
                supabase: null,

                async init() {
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    this.fetch();
                    this.subscribe();
                    lucide.createIcons();
                },

                bypass() {
                    this.view = 'grid';
                    this.username = 'DIRECTOR_MOG';
                },

                async fetch() {
                    const { data } = await this.supabase.from('messages').select('*').order('created_at', { ascending: true });
                    this.messages = data || [];
                    this.scroll();
                },
                
                subscribe() {
                    this.supabase.channel('hq').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (p) => {
                        this.messages.push(p.new);
                        this.scroll();
                    }).subscribe();
                },

                async send() {
                    if (!this.msgInput.trim()) return;
                    
                    // Sending to your database using the 'content' column
                    const { error } = await this.supabase.from('messages').insert([{ 
                        content: this.msgInput, 
                        username: this.username,
                        is_admin: true
                    }]);
                    
                    if (error) {
                        console.error(error);
                        alert("Database Error: " + error.message);
                    }
                    this.msgInput = '';
                },

                scroll() { this.$nextTick(() => { const el = document.getElementById('chat-stream'); if (el) el.scrollTop = el.scrollHeight; }); }
            }
        }
    </script>
</body>
</html>
