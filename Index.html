<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY OF GROOVE | NCC MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignal.js" async></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "3ef253d3-a093-42f5-bc88-91dd7576cf34",
          safari_web_id: "web.onesignal.auto.102e3b2b-5f1a-4c2d-9b1e-64d858376e1a",
          notifyButton: { enable: true },
        });
        const handle = localStorage.getItem('mog_handle');
        if (handle) OneSignal.User.addAlias("external_id", handle);
      });
    </script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');</style>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="ministry()" x-init="init()" x-cloak class="bg-black text-gold">
    <div class="scanline"></div>

    <template x-if="isLockdown">
        <div class="fixed top-0 left-0 w-full bg-red-600 text-white py-2 z-[100] text-center font-black text-[10px] tracking-[0.3em] animate-pulse">
            SYSTEM_LOCKDOWN: RESTRICTED ACCESS MODE ACTIVE
        </div>
    </template>

    <div x-data="inbox()" x-init="init()" x-show="hasNewMessage" x-transition class="fixed bottom-28 left-6 right-6 glass p-4 rounded-2xl border-gold animate-bounce z-50">
        <div class="flex items-center gap-3">
            <img src="1000219947.png" class="h-6 w-6 gold-glow rounded-full">
            <div class="flex-grow">
                <p class="text-[8px] font-black uppercase text-white">Direct Instruction Received</p>
                <p class="text-[10px] text-gold/80 terminal-font" x-text="latestMessage"></p>
            </div>
            <button @click="dismiss()" class="text-[8px] uppercase opacity-40">Dismiss</button>
        </div>
    </div>

    <template x-if="view === 'auth'">
        <div class="h-screen w-full flex flex-col items-center justify-center p-10 text-center animate-in fade-in duration-1000">
            <img src="logo.png" class="h-32 w-32 mb-8 gold-glow animate-pulse cursor-pointer transition-transform active:scale-90 rounded-full object-cover" @click="showBypass = !showBypass">
            <div class="w-full max-w-xs space-y-6">
                <div x-show="!showBypass" class="space-y-4">
                    <div class="space-y-1">
                        <h1 class="text-white font-black uppercase tracking-[0.4em] text-xs italic">Ministry of Groove</h1>
                        <p class="text-gold/40 text-[7px] uppercase font-black tracking-[0.3em]">Grid Synchronization Required</p>
                    </div>
                    <input x-model="handleInput" type="text" placeholder="ENTER OPERATIVE HANDLE..." class="w-full bg-white/5 border border-gold/20 p-5 rounded-2xl text-[10px] text-white uppercase outline-none focus:border-gold terminal-font text-center">
                    <button @click="initializeUser()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-full shadow-lg active:scale-95 transition-all">Initialize Access</button>
                </div>
                <div x-show="showBypass" x-transition class="glass p-6 rounded-[2.5rem] space-y-4 border-gold/40">
                    <h2 class="text-white text-[9px] font-black uppercase tracking-widest italic">Directorate Override</h2>
                    <input x-model="dirEmail" type="email" placeholder="DIRECTOR_ID" class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white text-center terminal-font outline-none">
                    <input x-model="dirPass" type="password" placeholder="PROTOCOL_KEY" class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white text-center terminal-font outline-none">
                    <button @click="executeBypass()" class="w-full py-4 bg-white text-black font-black text-[9px] uppercase rounded-full hover:bg-gold transition-colors">Execute 2026 Bypass</button>
                    <button @click="showBypass = false" class="text-[7px] uppercase text-white/40 tracking-widest">Abort</button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="view === 'grid'">
        <div class="min-h-screen flex flex-col relative animate-in fade-in duration-500 pb-[100px]" :class="isLockdown ? 'pt-10' : ''">
            <header class="p-6 border-b border-gold/10 glass flex justify-between items-center sticky top-0 z-50">
                <div class="flex items-center gap-4">
                    <img src="logo.png" class="h-10 w-10 gold-glow rounded-full object-cover">
                    <p class="text-[10px] font-black uppercase text-white tracking-widest italic leading-tight">Ministry of Groove</p>
                </div>
                <button @click="logout()" class="p-2 border border-red-900/30 text-red-500 rounded-lg"><i data-lucide="power" size="16"></i></button>
            </header>

            <main class="p-6 space-y-6 max-w-5xl mx-auto w-full">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div @click="subView = 'chat'" :class="subView === 'chat' ? 'border-blue-400 bg-blue-400/10 shadow-[0_0_15px_rgba(96,165,250,0.2)]' : 'border-gold/10'" class="glass p-6 sm:p-8 rounded-[2rem] text-center cursor-pointer border transition-all">
                        <i data-lucide="message-square" class="mx-auto mb-2 text-blue-400"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest text-white">Grid</span>
                    </div>
                    <div @click="window.location.href='dossier.html'" class="glass p-6 sm:p-8 rounded-[2rem] text-center cursor-pointer border border-gold/10">
                        <i data-lucide="user-cog" class="mx-auto mb-2 text-green-400"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest text-white">Dossier</span>
                    </div>
                    <div @click="subView = 'gallery'" :class="subView === 'gallery' ? 'border-purple-400 bg-purple-400/10 shadow-[0_0_15px_rgba(192,132,252,0.2)]' : 'border-gold/10'" class="glass p-6 sm:p-8 rounded-[2rem] text-center cursor-pointer border transition-all">
                        <i data-lucide="camera" class="mx-auto mb-2 text-purple-400"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest text-white">Gallery</span>
                    </div>
                    <div @click="window.location.href='archives.html'" class="glass p-6 sm:p-8 rounded-[2rem] text-center cursor-pointer border border-gold/10">
                        <i data-lucide="database" class="mx-auto mb-2 text-gold"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest text-white">Vault</span>
                    </div>
                </div>

                <div x-show="subView === 'chat'" class="glass rounded-[3rem] h-[45vh] flex flex-col overflow-hidden">
                    <div id="chat-stream" class="flex-grow overflow-y-auto p-6 space-y-4">
                        <template x-for="msg in messages" :key="msg.id">
                            <div :class="msg.username === 'DIRECTORATE' ? 'ml-auto items-end' : 'mr-auto items-start'" class="flex flex-col gap-1 max-w-[85%] animate-in slide-in-from-bottom-2">
                                <div class="flex items-center gap-1">
                                    <template x-if="msg.username === 'DIRECTORATE'"><img src="1000219947.png" class="h-3 w-3 gold-glow rounded-full"></template>
                                    <span class="text-[7px] font-black text-zinc-500 px-2 uppercase" x-text="msg.username"></span>
                                </div>
                                <div :class="msg.username === 'DIRECTORATE' ? 'bg-gold/10 border-gold/20 text-white' : 'bg-white/5 border-white/5 text-white/80'" class="p-4 border rounded-2xl text-[12px]" x-text="msg.content"></div>
                            </div>
                        </template>
                    </div>
                    <form @submit.prevent="send()" class="p-4 bg-black/40 border-t border-gold/10 flex gap-3">
                        <input x-model="msgInput" placeholder="COMMAND UPLINK..." class="flex-grow bg-transparent text-[12px] text-white outline-none terminal-font">
                        <button type="submit" class="text-gold"><i data-lucide="send-horizontal"></i></button>
                    </form>
                </div>
            </main>
        </div>
    </template>

    <script>
        const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        function inbox() {
            return {
                hasNewMessage: false, latestMessage: '',
                async init() {
                    const handle = localStorage.getItem('mog_handle');
                    if(!handle) return;
                    const { data } = await supabase.from('direct_messages').select('*').eq('recipient', handle).eq('is_read', false).order('created_at', { ascending: false }).limit(1);
                    if (data?.length) { this.latestMessage = data[0].content; this.hasNewMessage = true; }
                    supabase.channel('dm_sync').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'direct_messages', filter: `recipient=eq.${handle}` }, payload => {
                        this.latestMessage = payload.new.content; this.hasNewMessage = true;
                    }).subscribe();
                },
                dismiss() { this.hasNewMessage = false; }
            }
        }

        function ministry() {
            return {
                view: 'auth', subView: 'chat', isLockdown: false, username: '', messages: [], msgInput: '',
                async init() {
                    this.supabase = supabase;
                    const saved = localStorage.getItem('mog_handle');
                    if(saved) { this.username = saved; this.view = 'grid'; }
                    this.fetchMessages();
                    this.subscribeRealtime();
                    this.updatePresence();
                    setInterval(() => this.updatePresence(), 30000);
                    setTimeout(() => lucide.createIcons(), 500);
                },
                subscribeRealtime() {
                    this.supabase.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                        this.messages.push(payload.new);
                        this.$nextTick(() => { const el = document.getElementById('chat-stream'); if(el) el.scrollTop = el.scrollHeight; });
                    }).subscribe();
                    this.supabase.channel('status').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'system_status' }, payload => {
                        if(payload.new.id === 'lockdown') this.isLockdown = payload.new.is_active;
                    }).subscribe();
                },
                async fetchMessages() { 
                    const { data } = await this.supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
                    this.messages = data || [];
                },
                async updatePresence() {
                    if (this.username) await this.supabase.from('presence').upsert({ username: this.username, last_seen: new Date().toISOString() }, { onConflict: 'username' });
                },
                async send() {
                    if(!this.msgInput.trim()) return;
                    await this.supabase.from('messages').insert([{ content: this.msgInput.toUpperCase(), username: this.username }]);
                    this.msgInput = '';
                },
                executeBypass() {
                    if(this.dirEmail === 'director.mog@gmail.com' && this.dirPass === '@MOGProtocol2026') {
                        this.username = 'DIRECTORATE';
                        localStorage.setItem('mog_handle', 'DIRECTORATE');
                        this.view = 'grid';
                    }
                },
                initializeUser() {
                    if(!this.handleInput.trim()) return;
                    this.username = this.handleInput.trim().toUpperCase();
                    localStorage.setItem('mog_handle', this.username);
                    this.view = 'grid';
                },
                logout() { localStorage.removeItem('mog_handle'); location.reload(); }
            }
        }
    </script>
</body>
    </html>
