<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY OF GROOVE | NCC SOVEREIGN</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({ appId: "3ef253d3-a093-42f5-bc88-91dd7576cf34" });
      });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 2rem; }
        .gold-glow { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
        [x-cloak] { display: none !important; }
        input { background: #111 !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body x-data="ministry()" x-init="init()" x-cloak>

    <template x-if="view === 'landing'">
        <div class="h-screen flex flex-col items-center justify-center text-center p-6 bg-black">
            <div @click="view = 'auth'" class="cursor-pointer active:scale-95 transition-all">
                <img src="logo.png" class="h-40 w-40 mx-auto mb-8 gold-glow animate-pulse">
                <h1 class="text-white text-4xl font-black uppercase tracking-[0.3em] italic">Ministry of Groove</h1>
                <p class="text-gold/40 text-[9px] tracking-[1em] mt-6 uppercase font-bold">Initialize Identity Uplink</p>
            </div>
        </div>
    </template>

    <template x-if="view === 'auth'">
        <div class="fixed inset-0 bg-black flex items-center justify-center p-4 z-[100]">
            <div class="max-w-md w-full p-10 glass text-center">
                <i data-lucide="shield-check" class="mx-auto text-gold mb-6" size="48"></i>
                <h2 class="text-white tracking-[0.3em] uppercase font-black mb-8 text-[10px]">Security Protocol</h2>
                
                <form @submit.prevent="runAuth()" class="space-y-4">
                    <input type="email" x-model="email" placeholder="GMAIL USERNAME" required class="w-full p-4 rounded-xl text-[10px] outline-none focus:border-gold">
                    <input type="password" x-model="password" placeholder="PRIVATE PASSKEY" required class="w-full p-4 rounded-xl text-[10px] outline-none focus:border-gold">
                    <button type="submit" class="w-full py-4 bg-gold text-black font-black text-[10px] uppercase rounded-xl shadow-lg">Establish Link</button>
                </form>

                <div class="mt-8 flex justify-center gap-6 text-[8px] uppercase font-black opacity-40">
                    <button @click="mode = 'login'" :class="mode === 'login' ? 'text-white' : ''">Login</button>
                    <button @click="mode = 'signup'" :class="mode === 'signup' ? 'text-white' : ''">Register</button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="view === 'grid'">
        <div class="min-h-screen flex flex-col">
            <header class="p-6 border-b border-gold/10 glass flex justify-between items-center rounded-none">
                <div class="flex items-center gap-3">
                    <img src="logo.png" class="h-8 w-8 gold-glow">
                    <span class="text-[10px] font-black uppercase tracking-widest text-white italic">NCC_Titanium</span>
                </div>
                <button @click="logout()" class="text-[8px] text-red-500 font-black uppercase border border-red-900/30 px-3 py-1.5 rounded-lg">Disconnect</button>
            </header>

            <main class="p-6 space-y-8 max-w-5xl mx-auto w-full">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div @click="subView = 'chat'" class="glass p-6 text-center cursor-pointer hover:border-gold transition-all">
                        <i data-lucide="message-square" class="mx-auto mb-3 text-blue-500"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest">Chat Site</span>
                    </div>
                    <div @click="openLink('gallery')" class="glass p-6 text-center cursor-pointer">
                        <i data-lucide="image" class="mx-auto mb-3 text-purple-500"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest">Gallery</span>
                    </div>
                    <div @click="openLink('music')" class="glass p-6 text-center cursor-pointer">
                        <i data-lucide="music" class="mx-auto mb-3 text-red-500"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest">YT Music</span>
                    </div>
                    <div @click="openLink('archives')" class="glass p-6 text-center cursor-pointer">
                        <i data-lucide="archive" class="mx-auto mb-3 text-gold"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest">Archives</span>
                    </div>
                </div>
                
                <div x-show="subView === 'chat'" class="glass h-[500px] flex flex-col overflow-hidden animate-in slide-in-from-bottom-5">
                    <div id="chat-stream" class="flex-grow overflow-y-auto p-6 space-y-4">
                        <template x-for="msg in messages" :key="msg.id">
                            <div :class="msg.is_admin ? 'border-l-2 border-gold bg-gold/5' : 'bg-white/5'" class="p-4 rounded-xl">
                                <p class="text-[7px] font-black uppercase mb-1" :class="msg.is_admin ? 'text-gold' : 'text-blue-400'" x-text="msg.username"></p>
                                <p class="text-xs text-zinc-300" x-text="msg.content"></p>
                            </div>
                        </template>
                    </div>
                    <form @submit.prevent="send()" class="p-4 bg-black/40 border-t border-white/5 flex gap-2">
                        <input x-model="msgInput" placeholder="TRANSMIT..." class="flex-grow bg-transparent text-xs text-white p-3 rounded-lg outline-none">
                        <button type="submit" class="text-gold uppercase font-black text-[9px] px-4">Send</button>
                    </form>
                </div>
            </main>
        </div>
    </template>

    <script>
        function ministry() {
            return {
                view: 'landing', subView: 'chat', mode: 'login',
                email: '', password: '', user: null, rank: 'FIELD OPERATIVE',
                messages: [], msgInput: '', supabase: null,

                async init() {
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    // This is your correct Anon Key
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    
                    const { data: { session } } = await this.supabase.auth.getSession();
                    if (session) this.setupSession(session.user);
                    
                    this.supabase.auth.onAuthStateChange((e, s) => { if (s) this.setupSession(s.user); });
                    lucide.createIcons();
                },

                async setupSession(user) {
                    this.user = user;
                    this.view = 'grid';
                    const { data: profile } = await this.supabase.from('members').select('rank').eq('user_id', user.id).maybeSingle();
                    if (profile) this.rank = profile.rank;
                    this.fetch();
                    this.subscribe();
                },

                async runAuth() {
                    if (this.mode === 'signup') {
                        const { error } = await this.supabase.auth.signUp({ email: this.email, password: this.password });
                        if (!error) alert("Identity Logged. Check Gmail to verify.");
                    } else {
                        const { error } = await this.supabase.auth.signInWithPassword({ email: this.email, password: this.password });
                        if (error) alert(error.message);
                    }
                },

                async fetch() {
                    const { data } = await this.supabase.from('messages').select('*').order('created_at', { ascending: true });
                    this.messages = data || [];
                    this.scroll();
                },

                subscribe() {
                    this.supabase.channel('hq').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (p) => {
                        this.messages.push(p.new);
                        this.scroll();
                    }).subscribe();
                },

                async send() {
                    if (!this.msgInput.trim()) return;
                    // Updated to use 'content' and 'user_id' as required by your DB
                    const { error } = await this.supabase.from('messages').insert([{ 
                        content: this.msgInput.toUpperCase(), 
                        user_id: this.user.id,
                        username: this.email.split('@')[0].toUpperCase(),
                        is_admin: (this.rank === 'ADMIN')
                    }]);
                    if (error) console.error(error);
                    this.msgInput = '';
                },

                openLink(site) {
                    const links = {
                        gallery: 'gallery.html',
                        music: 'https://music.youtube.com',
                        archives: 'archives.html'
                    };
                    window.open(links[site], '_blank');
                },

                scroll() { this.$nextTick(() => { const el = document.getElementById('chat-stream'); if (el) el.scrollTop = el.scrollHeight; }); },
                logout() { this.supabase.auth.signOut(); location.reload(); }
            }
        }
    </script>
</body>
</html>
