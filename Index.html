<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY OF GROOVE | NCC MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.15); }
        .gold-glow { filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.4)); }
        [x-cloak] { display: none !important; }
        /* Fail-safe: if JS fails, this class will be removed by the browser after 3s */
        .loading-lock { opacity: 0; pointer-events: none; }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="ministry()" x-init="init()" class="bg-black text-gold">
    <div class="scanline"></div>

    <div x-data="inbox()" x-init="init()" x-show="hasNewMessage" x-cloak class="fixed bottom-28 left-6 right-6 glass p-4 rounded-2xl border-gold animate-bounce z-50">
        <div class="flex items-center gap-3">
            <img src="logo.png" class="h-6 w-6 gold-glow rounded-full">
            <div class="flex-grow">
                <p class="text-[8px] font-black uppercase text-white">Direct Instruction</p>
                <p class="text-[10px] text-gold/80" x-text="latestMessage"></p>
            </div>
            <button @click="hasNewMessage = false" class="text-[8px] uppercase opacity-40">Dismiss</button>
        </div>
    </div>

    <template x-if="view === 'auth'">
        <div class="h-screen w-full flex flex-col items-center justify-center p-10 text-center">
            <img src="logo.png" class="h-32 w-32 mb-8 gold-glow animate-pulse cursor-pointer rounded-full object-cover" @click="showBypass = !showBypass">
            <div class="w-full max-w-xs space-y-6">
                <div x-show="!showBypass" class="space-y-4">
                    <h1 class="text-white font-black uppercase tracking-[0.4em] text-xs italic">Ministry of Groove</h1>
                    <input x-model="handleInput" type="text" placeholder="OPERATIVE_HANDLE..." class="w-full bg-white/5 border border-gold/20 p-5 rounded-2xl text-[10px] text-white text-center uppercase outline-none">
                    <button @click="initializeUser()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-full shadow-lg">Initialize Access</button>
                </div>
                <div x-show="showBypass" class="glass p-6 rounded-[2.5rem] space-y-4">
                    <input x-model="dirEmail" type="text" placeholder="DIRECTOR_ID" class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white text-center outline-none">
                    <input x-model="dirPass" type="password" placeholder="PROTOCOL_KEY" class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white text-center outline-none">
                    <button @click="executeBypass()" class="w-full py-4 bg-white text-black font-black text-[9px] uppercase rounded-full">Execute 2026 Bypass</button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="view === 'grid'">
        <div class="min-h-screen flex flex-col relative animate-in fade-in pb-[100px]">
            <header class="p-6 border-b border-gold/10 glass flex justify-between items-center sticky top-0 z-50">
                <div class="flex items-center gap-4">
                    <img src="logo.png" class="h-10 w-10 gold-glow rounded-full">
                    <p class="text-[10px] font-black uppercase text-white tracking-widest italic leading-tight">Ministry of Groove</p>
                </div>
                <button @click="logout()" class="p-2 border border-red-900/30 text-red-500 rounded-lg"><i data-lucide="power" size="16"></i></button>
            </header>

            <main class="p-6 space-y-6 max-w-5xl mx-auto w-full">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div @click="subView = 'chat'" class="glass p-6 rounded-[2rem] text-center cursor-pointer border border-gold/10 hover:border-blue-400">
                        <i data-lucide="message-square" class="mx-auto mb-2 text-blue-400"></i>
                        <span class="text-[9px] font-black uppercase text-white">Grid</span>
                    </div>
                    <div @click="window.location.href='dossier.html'" class="glass p-6 rounded-[2rem] text-center cursor-pointer border border-gold/10 hover:border-green-400">
                        <i data-lucide="user-cog" class="mx-auto mb-2 text-green-400"></i>
                        <span class="text-[9px] font-black uppercase text-white">Dossier</span>
                    </div>
                    <div @click="subView = 'gallery'" class="glass p-6 rounded-[2rem] text-center cursor-pointer border border-gold/10 hover:border-purple-400">
                        <i data-lucide="camera" class="mx-auto mb-2 text-purple-400"></i>
                        <span class="text-[9px] font-black uppercase text-white">Gallery</span>
                    </div>
                    <div @click="window.location.href='archives.html'" class="glass p-6 rounded-[2rem] text-center cursor-pointer border border-gold/10 hover:border-gold">
                        <i data-lucide="database" class="mx-auto mb-2 text-gold"></i>
                        <span class="text-[9px] font-black uppercase text-white">Vault</span>
                    </div>
                </div>

                <div x-show="subView === 'chat'" class="glass rounded-[3rem] h-[45vh] flex flex-col overflow-hidden">
                    <div id="chat-stream" class="flex-grow overflow-y-auto p-6 space-y-4">
                        <template x-for="msg in messages" :key="msg.id">
                            <div :class="msg.username === 'DIRECTORATE' ? 'ml-auto items-end' : 'mr-auto items-start'" class="flex flex-col gap-1 max-w-[85%]">
                                <span class="text-[7px] font-black text-zinc-500 uppercase px-2" x-text="msg.username"></span>
                                <div :class="msg.username === 'DIRECTORATE' ? 'bg-gold/10 border-gold/20' : 'bg-white/5 border-white/5'" class="p-4 border rounded-2xl text-[12px] text-white" x-text="msg.content"></div>
                            </div>
                        </template>
                    </div>
                    <form @submit.prevent="send()" class="p-4 bg-black/40 border-t border-gold/10 flex gap-3">
                        <input x-model="msgInput" placeholder="COMMAND UPLINK..." class="flex-grow bg-transparent text-[12px] text-white outline-none">
                        <button type="submit" class="text-gold"><i data-lucide="send-horizontal"></i></button>
                    </form>
                </div>
            </main>
        </div>
    </template>

    <script>
        const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        function inbox() {
            return {
                hasNewMessage: false, latestMessage: '',
                async init() {
                    const handle = localStorage.getItem('mog_handle');
                    if(!handle) return;
                    supabase.channel('dm_sync').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'direct_messages', filter: `recipient=eq.${handle}` }, p => {
                        this.latestMessage = p.new.content; this.hasNewMessage = true;
                    }).subscribe();
                }
            }
        }

        function ministry() {
            return {
                view: 'auth', subView: 'chat', username: '', handleInput: '', messages: [], msgInput: '', showBypass: false, dirEmail: '', dirPass: '', isLockdown: false,
                async init() {
                    const saved = localStorage.getItem('mog_handle');
                    if(saved) { this.username = saved; this.view = 'grid'; }
                    this.fetchMessages();
                    this.subscribe();
                    setTimeout(() => lucide.createIcons(), 200);
                },
                subscribe() {
                    supabase.channel('msgs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
                        this.messages.push(p.new);
                        this.$nextTick(() => { const el = document.getElementById('chat-stream'); if(el) el.scrollTop = el.scrollHeight; });
                    }).subscribe();
                    supabase.channel('sys').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'system_status' }, p => {
                        if(p.new.id === 'lockdown') this.isLockdown = p.new.is_active;
                    }).subscribe();
                },
                async fetchMessages() {
                    const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
                    this.messages = data || [];
                },
                async send() {
                    if(!this.msgInput.trim()) return;
                    await supabase.from('messages').insert([{ content: this.msgInput.toUpperCase(), username: this.username }]);
                    this.msgInput = '';
                },
                initializeUser() {
                    if(!this.handleInput.trim()) return;
                    this.username = this.handleInput.toUpperCase();
                    localStorage.setItem('mog_handle', this.username);
                    this.view = 'grid';
                    location.reload();
                },
                executeBypass() {
                    if(this.dirEmail === 'director.mog@gmail.com' && this.dirPass === '@MOGProtocol2026') {
                        localStorage.setItem('mog_handle', 'DIRECTORATE');
                        location.reload();
                    }
                },
                logout() { localStorage.removeItem('mog_handle'); location.reload(); }
            }
        }
    </script>
</body>
</html>
