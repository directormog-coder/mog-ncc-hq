<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY OF GROOVE | NCC MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // CONFIGURATION: Ensure these are correct
        tailwind.config = {
            theme: { extend: { colors: { gold: '#D4AF37', noir: '#050505' } } }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="ministry()" x-init="init()" class="bg-black text-gold">
    <div class="scanline"></div>

    <div id="recovery-bar" class="fixed top-0 left-0 w-full bg-red-600 text-white text-[8px] py-1 px-4 z-[500] text-center font-bold">
        GRID_OFFLINE: PENDING INITIALIZATION...
    </div>

    <template x-if="view === 'auth'">
        <div class="h-screen w-full flex flex-col items-center justify-center p-10 text-center bg-black">
            <img src="logo.png" @click="forceReset()" class="h-32 w-32 mb-8 gold-glow animate-pulse cursor-pointer rounded-full object-cover border-2 border-gold/20">
            <div class="w-full max-w-xs space-y-6">
                <div class="space-y-1">
                    <h1 class="text-white font-black uppercase tracking-[0.4em] text-xs italic">Ministry of Groove</h1>
                    <p class="text-gold/40 text-[7px] uppercase font-black tracking-[0.3em]">Grid Synchronization Required</p>
                </div>
                <input x-model="handleInput" type="text" placeholder="OPERATIVE_ID..." class="w-full bg-white/5 border border-gold/20 p-5 rounded-2xl text-[10px] text-white text-center terminal-font outline-none uppercase">
                <button @click="initializeUser()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-full shadow-lg active:scale-95 transition-all">Initialize Access</button>
                <p class="text-[6px] text-zinc-600 mt-4 uppercase">Click Logo to Hard-Reset Grid</p>
            </div>
        </div>
    </template>

    <template x-if="view === 'grid'">
        <div class="min-h-screen flex flex-col relative animate-in fade-in duration-500">
             <header class="p-6 border-b border-gold/10 glass flex justify-between items-center sticky top-0 z-50">
                <div class="flex items-center gap-4">
                    <img src="logo.png" class="h-10 w-10 gold-glow rounded-full">
                    <p class="text-[10px] font-black uppercase text-white tracking-widest italic">Ministry of Groove</p>
                </div>
                <button @click="logout()" class="p-2 border border-red-900/30 text-red-500 rounded-lg"><i data-lucide="power" size="16"></i></button>
            </header>
            <main class="p-6">
                <h2 class="text-white text-xs font-black uppercase tracking-widest mb-4">Uplink Active</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div @click="window.location.href='dossier.html'" class="glass p-6 rounded-3xl text-center border-gold/10">
                        <i data-lucide="user" class="mx-auto mb-2"></i>
                        <span class="text-[8px] font-black uppercase">Dossier</span>
                    </div>
                    <div @click="window.location.href='archives.html'" class="glass p-6 rounded-3xl text-center border-gold/10">
                        <i data-lucide="database" class="mx-auto mb-2"></i>
                        <span class="text-[8px] font-black uppercase">Vault</span>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <script>
        function ministry() {
            return {
                view: 'auth', handleInput: '', username: '', isLockdown: false,
                init() {
                    // Remove recovery bar if JS starts
                    document.getElementById('recovery-bar').style.display = 'none';
                    
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    
                    const saved = localStorage.getItem('mog_handle');
                    if(saved) { this.username = saved; this.view = 'grid'; }
                    lucide.createIcons();
                },
                initializeUser() {
                    if(!this.handleInput.trim()) return;
                    this.username = this.handleInput.toUpperCase();
                    localStorage.setItem('mog_handle', this.username);
                    this.view = 'grid';
                },
                forceReset() {
                    if(confirm("Wipe cache and reset Grid?")) {
                        localStorage.clear();
                        sessionStorage.clear();
                        navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
                        location.reload(true);
                    }
                },
                logout() { localStorage.removeItem('mog_handle'); location.reload(); }
            }
        }
    </script>
</body>
                                                                                                           </html>
