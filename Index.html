<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY OF GROOVE | NCC MASTER</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <link rel="icon" type="image/jpeg" href="1000225933.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
    
    <style>
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        .glass { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.15); }
        .gold-glow { filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.4)); }
        .terminal-font { font-family: 'JetBrains Mono', monospace; }
        [x-cloak] { display: none !important; }
        .sync-ring { border: 2px solid transparent; border-top-color: var(--gold); border-radius: 50%; animation: spin 2s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
    </style>
</head>
<body x-data="ministry()" x-init="init()" x-cloak>

    <div x-show="loading" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center space-y-6">
        <div class="relative">
            <div class="sync-ring h-24 w-24 absolute -top-4 -left-4 opacity-30"></div>
            <img src="1000225933.jpg" class="h-16 w-16 rounded-full gold-glow animate-pulse relative z-10">
        </div>
        <div class="text-center space-y-2">
            <p class="text-[8px] font-black uppercase tracking-[0.5em] text-white italic animate-pulse">Synchronizing Grid</p>
            <p class="text-[6px] terminal-font text-gold/40 uppercase" x-text="syncStatus">Acquiring Frequencies...</p>
        </div>
    </div>

    <div x-show="!loading" class="animate-in fade-in duration-700">
        
        <template x-if="view === 'auth'">
            <div class="h-screen w-full relative flex flex-col items-center justify-center overflow-hidden">
                <video autoplay muted loop playsinline class="absolute z-0 w-auto min-w-full min-h-full max-w-none opacity-40 grayscale">
                    <source src="1000211769.mp4" type="video/mp4">
                </video>
                
                <div class="relative z-10 flex flex-col items-center w-full px-10">
                    <img src="1000225933.jpg" class="h-32 w-32 mb-8 gold-glow rounded-full object-cover cursor-pointer transition-transform active:scale-90" @click="showBypass = !showBypass">
                    
                    <div class="w-full max-w-xs space-y-6">
                        <div x-show="!showBypass" class="space-y-4 text-center">
                            <h1 class="text-white font-black uppercase tracking-[0.4em] text-xs italic">Ministry of Groove</h1>
                            <input x-model="handleInput" type="text" placeholder="OPERATIVE HANDLE..." class="w-full bg-white/5 border border-gold/20 p-5 rounded-2xl text-[10px] text-white uppercase outline-none focus:border-gold terminal-font text-center">
                            <button @click="initializeUser()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-full shadow-lg active:scale-95 transition-all">Initialize Access</button>
                        </div>

                        <div x-show="showBypass" x-transition class="glass p-6 rounded-[2.5rem] space-y-4 border-gold/40 text-center">
                            <h2 class="text-white text-[9px] font-black uppercase tracking-widest italic leading-tight">Directorate Override</h2>
                            <input x-model="dirEmail" type="email" placeholder="DIRECTOR_ID" class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white text-center terminal-font outline-none">
                            <input x-model="dirPass" type="password" placeholder="PROTOCOL_KEY" class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white text-center terminal-font outline-none">
                            <button @click="executeBypass()" class="w-full py-4 bg-white text-black font-black text-[9px] uppercase rounded-full hover:bg-gold transition-colors">Execute 2026 Bypass</button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <template x-if="view === 'grid'">
            <div class="min-h-screen flex flex-col relative pb-[120px]">
                <header class="p-6 border-b border-gold/10 glass flex justify-between items-center sticky top-0 z-50">
                    <div class="flex items-center gap-4">
                        <img src="1000225933.jpg" class="h-10 w-10 gold-glow rounded-full">
                        <p class="text-[10px] font-black uppercase text-white tracking-widest italic">Ministry of Groove</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <p id="sast-clock" class="terminal-font text-[10px] text-white">00:00:00</p>
                            <p id="weather-display" class="text-[6px] text-gold/40 font-black uppercase tracking-tighter">EMALAHLENI</p>
                        </div>
                        <button @click="logout()" class="p-2 border border-red-900/30 text-red-500 rounded-lg"><i data-lucide="power" size="16"></i></button>
                    </div>
                </header>

                <main class="p-6 space-y-6 max-w-5xl mx-auto w-full overflow-y-auto">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div @click="subView = 'chat'" class="glass p-8 rounded-[2rem] text-center cursor-pointer border border-gold/10">
                            <i data-lucide="message-square" class="mx-auto mb-2 text-blue-400"></i>
                            <span class="text-[9px] font-black uppercase tracking-widest text-white">Grid</span>
                        </div>
                        <div @click="window.location.href='dossier.html'" class="glass p-8 rounded-[2rem] text-center cursor-pointer border border-gold/10">
                            <i data-lucide="user-cog" class="mx-auto mb-2 text-green-400"></i>
                            <span class="text-[9px] font-black uppercase tracking-widest text-white">Dossier</span>
                        </div>
                        <div @click="subView = 'gallery'" class="glass p-8 rounded-[2rem] text-center cursor-pointer border border-gold/10">
                            <i data-lucide="camera" class="mx-auto mb-2 text-purple-400"></i>
                            <span class="text-[9px] font-black uppercase tracking-widest text-white">Gallery</span>
                        </div>
                        <div @click="window.location.href='archives.html'" class="glass p-8 rounded-[2rem] text-center cursor-pointer border border-gold/10">
                            <i data-lucide="database" class="mx-auto mb-2 text-gold"></i>
                            <span class="text-[9px] font-black uppercase tracking-widest text-white">Vault</span>
                        </div>
                    </div>

                    <div x-show="subView === 'chat'" class="glass rounded-[3rem] h-[45vh] flex flex-col overflow-hidden border-white/5 animate-in slide-in-from-bottom-4">
                        <div id="chat-stream" class="flex-grow overflow-y-auto p-6 space-y-4">
                            <template x-for="msg in messages" :key="msg.id">
                                <div :class="msg.username === 'DIRECTORATE' ? 'ml-auto items-end' : 'mr-auto items-start'" class="flex flex-col gap-1 max-w-[85%]">
                                    <span class="text-[7px] font-black text-zinc-500 px-2 uppercase" x-text="msg.username"></span>
                                    <div :class="msg.username === 'DIRECTORATE' ? 'bg-gold/10 border-gold/20 text-white' : 'bg-white/5 border-white/5 text-white/80'" class="p-4 border rounded-2xl text-[12px]" x-text="msg.content"></div>
                                </div>
                            </template>
                        </div>
                        <form @submit.prevent="send()" class="p-4 bg-black/40 border-t border-gold/10 flex gap-3">
                            <input x-model="msgInput" placeholder="COMMAND UPLINK..." class="flex-grow bg-transparent text-[12px] text-white outline-none">
                            <button type="submit" class="text-gold active:scale-90 transition-all"><i data-lucide="send-horizontal"></i></button>
                        </form>
                    </div>
                </main>
                
                <footer class="glass border-t border-gold/20 flex flex-col sm:flex-row justify-between items-center px-6 py-4 gap-4 sm:gap-0 fixed bottom-0 w-full left-0 z-[100]">
                    <div class="flex flex-col items-center sm:items-start gap-1">
                        <p class="terminal-font text-[7px] font-black uppercase text-gold/60">© 2026 MINISTRY OF GROOVE</p>
                        <div class="flex gap-3 text-[6px] font-black uppercase tracking-widest text-gold/30">
                            <a href="tos.html" class="hover:text-gold transition-colors">Protocol TOS</a> | 
                            <a href="privacy.html" class="hover:text-gold transition-colors">Privacy Shield</a>
                        </div>
                    </div>
                    <div class="flex gap-6 text-white/40">
                        <a href="mailto:director.mog@gmail.com"><i data-lucide="mail" size="20"></i></a>
                        <a href="https://instagram.com/ministryofgroove_hq" target="_blank"><i data-lucide="instagram" size="20"></i></a>
                        <a href="https://tiktok.com/@ministryofgroove" target="_blank"><i data-lucide="music-2" size="20"></i></a>
                    </div>
                </footer>
            </div>
        </template>
    </div>

    <script>
        function ministry() {
            return {
                loading: true, syncStatus: 'Acquiring Frequencies...',
                view: 'auth', subView: 'chat', showBypass: false, dirEmail: '', dirPass: '', 
                username: '', handleInput: '', messages: [], msgInput: '',
                async init() {
                    setTimeout(() => { this.syncStatus = 'Decrypting Vault...'; }, 800);
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    const saved = localStorage.getItem('mog_handle');
                    if(saved) { this.username = saved; this.view = 'grid'; }
                    this.fetch();
                    setTimeout(() => { this.loading = false; lucide.createIcons(); }, 2500);
                    setInterval(() => this.updateClock(), 1000);
                },
                initializeUser() {
                    if(!this.handleInput.trim()) return;
                    this.username = this.handleInput.trim().toUpperCase();
                    localStorage.setItem('mog_handle', this.username);
                    this.view = 'grid';
                },
                executeBypass() {
                    if(this.dirEmail === 'director.mog@gmail.com' && this.dirPass === '@MOGProtocol2026') {
                        localStorage.setItem('mog_handle', 'DIRECTORATE');
                        location.reload();
                    }
                },
                async fetch() { 
                    const { data } = await this.supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
                    this.messages = data || [];
                },
                async send() {
                    if(!this.msgInput.trim()) return;
                    await this.supabase.from('messages').insert([{ content: this.msgInput.toUpperCase(), username: this.username }]);
                    this.msgInput = ''; this.fetch();
                },
                logout() { localStorage.removeItem('mog_handle'); location.reload(); },
                updateClock() {
                    const now = new Date();
                    const clockEl = document.getElementById('sast-clock');
                    if(clockEl) clockEl.innerText = now.toLocaleTimeString('en-GB', { timeZone: 'Africa/Johannesburg' });
                }
            }
        }
    </script>
</body>
</html>
