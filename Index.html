<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.O.G. | OPERATIVE TERMINAL</title>
    <meta name="theme-color" content="#050505">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --gold: #D4AF37; --blue: #007BFF; --noir: #050505; }
        body { 
            background-color: var(--noir); color: white; font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(circle at 2px 2px, rgba(212, 175, 55, 0.05) 1px, transparent 0);
            background-size: 40px 40px; min-height: 100vh;
        }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-gradient { background: linear-gradient(to right, #D4AF37, #F3E5AB, #D4AF37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.1); transition: all 0.4s; }
        .auth-input { background: rgba(0,0,0,0.6); border: 1px solid #333; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        .auth-input:focus { border-color: var(--gold); }
        .btn-gold { background: var(--gold); color: black; font-weight: 900; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .avatar-ring { border: 2px solid var(--gold); padding: 4px; border-radius: 50%; cursor: pointer; transition: transform 0.3s; }
        .avatar-ring:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .hidden { display: none !important; }
        .spinner { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full glass z-[100] px-8 py-6 flex justify-between items-center border-b border-white/5">
        <div class="serif text-2xl gold-gradient italic flex items-center gap-3">M.O.G.</div>
        <div id="status-tag" class="text-[9px] text-blue-500 font-black uppercase tracking-[0.4em]">Grid Offline</div>
    </nav>

    <main class="pt-40 pb-20 px-6 max-w-5xl mx-auto">
        
        <section id="unauthorized-view" class="max-w-md mx-auto glass p-10 rounded-[3rem] text-center">
            <p class="text-[10px] text-blue-500 font-black uppercase tracking-widest mb-2">Identity Uplink</p>
            <h2 class="serif text-4xl gold-gradient italic mb-8">Join The Ministry</h2>
            <div class="space-y-4">
                <input type="email" id="email" class="auth-input" placeholder="Email Address">
                <input type="password" id="pass" class="auth-input" placeholder="Passkey">
                <button onclick="handleAuth()" id="login-btn" class="btn-gold mt-4">Establish Link</button>
                <button onclick="googleLogin()" class="w-full py-3 text-[10px] text-zinc-500 uppercase tracking-widest hover:text-white transition">Sync via Google</button>
            </div>
        </section>

        <section id="authorized-view" class="hidden">
            <div class="glass p-8 md:p-12 rounded-[4rem] border-gold/10 relative overflow-hidden">
                <div class="flex flex-col md:flex-row gap-12 items-center">
                    
                    <div class="relative group">
                        <div class="avatar-ring w-32 h-32 md:w-44 md:h-44 overflow-hidden bg-zinc-900 flex items-center justify-center">
                            <img id="avatar-img" src="https://via.placeholder.com/150" class="w-full h-full object-cover rounded-full" alt="Operative">
                            <div id="upload-overlay" class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition rounded-full">
                                <span class="text-[10px] font-bold uppercase">Update</span>
                            </div>
                        </div>
                        <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="uploadAvatar()">
                    </div>

                    <div class="flex-1 text-center md:text-left">
                        <span class="text-[10px] text-green-500 font-black uppercase tracking-widest">Connection Active</span>
                        <div class="flex items-center justify-center md:justify-start gap-4 mt-2">
                            <h2 id="user-display" class="serif text-5xl gold-gradient italic">Operative</h2>
                            <button onclick="toggleEditMode()" class="text-zinc-600 hover:text-gold transition">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                        </div>
                        <p id="rank-display" class="text-xs text-zinc-500 font-bold uppercase tracking-[0.4em] mt-3">Field Operative</p>
                        
                        <div id="edit-mode" class="hidden mt-6 flex gap-2">
                            <input type="text" id="new-username" class="auth-input text-sm py-2" placeholder="New Callsign">
                            <button onclick="updateProfileName()" class="bg-white/10 px-4 rounded-xl text-[10px] uppercase font-bold hover:bg-gold hover:text-black transition">Save</button>
                        </div>

                        <div class="mt-12 flex flex-wrap gap-4 justify-center md:justify-start">
                            <button onclick="logout()" class="text-[9px] font-black uppercase tracking-widest text-red-900 hover:text-red-500 transition">Terminate Link</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
    </main>

    <script>
        const SB_URL = 'https://qqwvliqculscmllqtggt.supabase.co';
        const SB_KEY = 'YOUR_ANON_KEY'; 
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        // UI Element Selectors
        const avatarImg = document.getElementById('avatar-img');
        const userDisplay = document.getElementById('user-display');
        const rankDisplay = document.getElementById('rank-display');

        // Initial Auth Setup
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                loadProfile(session.user);
            } else {
                showView('unauthorized-view');
            }
        });

        async function loadProfile(user) {
            showView('authorized-view');
            document.getElementById('status-tag').innerText = "Frequency Active";
            document.getElementById('status-tag').className = "text-[9px] text-[#D4AF37] font-black uppercase tracking-[0.4em]";

            const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            
            if (profile) {
                userDisplay.innerText = profile.username || user.email.split('@')[0];
                rankDisplay.innerText = profile.rank || 'FIELD OPERATIVE';
                if (profile.avatar_url) avatarImg.src = profile.avatar_url;
            }
        }

        // Avatar Upload Logic
        document.getElementById('avatar-img').onclick = () => document.getElementById('avatar-input').click();

        async function uploadAvatar() {
            const file = document.getElementById('avatar-input').files[0];
            const user = (await supabase.auth.getUser()).data.user;
            if (!file || !user) return;

            const fileExt = file.name.split('.').pop();
            const filePath = `${user.id}/avatar.${fileExt}`;

            // 1. Upload to Supabase Storage (Bucket must be named 'avatars')
            const { error: uploadError } = await supabase.storage
                .from('avatars')
                .upload(filePath, file, { upsert: true });

            if (uploadError) return alert("Upload Failed: " + uploadError.message);

            // 2. Get Public URL
            const { data: { publicUrl } } = supabase.storage.from('avatars').getPublicUrl(filePath);

            // 3. Update Profile Table
            await supabase.from('profiles').update({ avatar_url: publicUrl }).eq('id', user.id);
            
            avatarImg.src = publicUrl;
            alert("Identity Visual Updated.");
        }

        // Profile Name Update
        function toggleEditMode() {
            document.getElementById('edit-mode').classList.toggle('hidden');
        }

        async function updateProfileName() {
            const newName = document.getElementById('new-username').value;
            const user = (await supabase.auth.getUser()).data.user;
            if (!newName) return;

            const { error } = await supabase.from('profiles').update({ username: newName }).eq('id', user.id);
            if (!error) {
                userDisplay.innerText = newName;
                toggleEditMode();
            }
        }

        // Auth Functions
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) await supabase.auth.signUp({ email, password });
        }

        async function googleLogin() {
            await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin }});
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        function showView(id) {
            document.getElementById('unauthorized-view').classList.add('hidden');
            document.getElementById('authorized-view').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
