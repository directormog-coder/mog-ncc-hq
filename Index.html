<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY OF GROOVE | NCC MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(20, 20, 20, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.15); }
        .gold-glow { filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.4)); }
        .terminal-font { font-family: 'JetBrains Mono', monospace; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="ministry()" x-init="init()" x-cloak>

    <template x-if="view === 'auth'">
        <div class="h-screen flex flex-col items-center justify-center bg-black p-10 text-center">
            <img src="logo.png" class="h-44 w-44 mb-8 gold-glow animate-pulse cursor-pointer" @click="bypass()">
            <h1 class="text-white font-black uppercase tracking-[0.3em] text-sm mb-2 italic">Ministry of Groove</h1>
            <p class="text-gold/40 text-[7px] uppercase font-black tracking-[0.4em] mb-10 italic">Decrypting the Culture. Synchronizing the Grid.</p>
            
            <div class="space-y-4 w-full max-w-xs animate-in fade-in zoom-in duration-1000">
                <input id="user-handle" type="text" placeholder="ENTER OPERATIVE HANDLE..." 
                       class="w-full bg-transparent border border-gold/20 p-5 rounded-2xl text-[10px] text-white uppercase outline-none focus:border-gold terminal-font text-center transition-all">
                <button @click="initializeUser()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-full tracking-widest active:scale-95 transition-all shadow-[0_0_20px_rgba(212,175,55,0.2)]">Initialize Access</button>
            </div>
        </div>
    </template>

    <template x-if="view === 'grid'">
        <div class="min-h-screen flex flex-col relative animate-in fade-in duration-700">
            
            <div x-show="showRules" class="absolute inset-0 z-[100] flex items-center justify-center bg-black/90 p-6 backdrop-blur-md">
                <div class="glass max-w-sm w-full p-8 rounded-[3rem] border-gold/30 text-center space-y-6">
                    <i data-lucide="shield-alert" class="mx-auto text-gold animate-pulse" size="32"></i>
                    <h2 class="text-[12px] font-black uppercase tracking-widest text-white">Grid Protocols</h2>
                    <div class="text-[8px] uppercase font-black text-gold/60 space-y-4 leading-relaxed">
                        <p>01. Respect the Directorate.</p>
                        <p>02. No unauthorized signal interference.</p>
                        <p>03. All transmissions are logged.</p>
                        <p>04. Maintain the groove.</p>
                    </div>
                    <button @click="acceptProtocols()" class="w-full py-4 bg-gold text-black font-black text-[10px] uppercase rounded-2xl active:scale-95 transition-all">Acknowledge & Sync</button>
                </div>
            </div>

            <header class="p-6 border-b border-gold/10 glass flex justify-between items-center sticky top-0 z-50">
                <div class="flex items-center gap-4">
                    <img src="logo.png" class="h-10 w-10 gold-glow">
                    <div class="flex flex-col">
                        <p class="text-[10px] font-black uppercase text-white tracking-widest italic leading-tight">Ministry of Groove</p>
                        <p class="text-[6px] text-gold/60 uppercase font-black tracking-[0.2em] mt-0.5">Decrypting the Culture. Synchronizing the Grid.</p>
                    </div>
                </div>
                <div class="text-right flex items-center gap-4">
                    <div class="hidden sm:block border-r border-gold/20 pr-4 text-right">
                        <p id="sast-clock" class="terminal-font text-[11px] font-bold text-white tracking-widest">00:00:00</p>
                        <p id="weather-display" class="text-[6px] text-gold/40 uppercase font-black tracking-tighter">SYNCING...</p>
                    </div>
                    <button @click="location.reload()" class="p-2 border border-red-900/30 text-red-500 rounded-lg active:rotate-180 transition-all duration-500"><i data-lucide="power" size="16"></i></button>
                </div>
            </header>

            <main class="p-6 space-y-6 max-w-5xl mx-auto w-full pb-32 overflow-y-auto">
                <template x-if="isLive">
                    <div @click="window.open('https://www.youtube.com/@MinistryofGroove-m1q/live', '_blank')" class="glass p-6 rounded-[2.5rem] border-red-500 bg-red-500/10 animate-pulse text-center cursor-pointer">
                        <span class="text-[10px] font-black uppercase text-white flex items-center justify-center gap-2 italic"><i data-lucide="radio"></i> DIRECTOR LIVE BROADCAST</span>
                    </div>
                </template>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div @click="subView = 'chat'" class="glass p-6 sm:p-8 rounded-[2rem] sm:rounded-[2.5rem] text-center cursor-pointer hover:border-blue-400/30 transition-all">
                        <i data-lucide="message-square" class="mx-auto mb-2 text-blue-400"></i>
                        <span class="text-[8px] sm:text-[9px] font-black uppercase tracking-widest text-white">Grid</span>
                    </div>
                    <div @click="window.location.href='dossier.html'" class="glass p-6 sm:p-8 rounded-[2rem] sm:rounded-[2.5rem] text-center cursor-pointer hover:border-green-400/30 transition-all">
                        <i data-lucide="user-cog" class="mx-auto mb-2 text-green-400"></i>
                        <span class="text-[8px] sm:text-[9px] font-black uppercase tracking-widest text-white">Dossier</span>
                    </div>
                    <div @click="window.location.href='gallery.html'" class="glass p-6 sm:p-8 rounded-[2rem] sm:rounded-[2.5rem] text-center cursor-pointer hover:border-purple-400/30 transition-all">
                        <i data-lucide="camera" class="mx-auto mb-2 text-purple-400"></i>
                        <span class="text-[8px] sm:text-[9px] font-black uppercase tracking-widest text-white">Gallery</span>
                    </div>
                    <div @click="window.location.href='archives.html'" class="glass p-6 sm:p-8 rounded-[2rem] sm:rounded-[2.5rem] text-center cursor-pointer relative hover:border-gold/50 transition-all">
                        <template x-if="unreadCount > 0 && username === 'DIRECTORATE'"><div class="absolute top-4 right-4 h-2 w-2 bg-gold rounded-full animate-ping"></div></template>
                        <i data-lucide="database" class="mx-auto mb-2 text-gold"></i>
                        <span class="text-[8px] sm:text-[9px] font-black uppercase tracking-widest text-white">Vault</span>
                    </div>
                </div>

                <div x-show="subView === 'chat'" class="glass rounded-[3rem] h-[50vh] flex flex-col overflow-hidden shadow-2xl">
                    <div id="chat-stream" class="flex-grow overflow-y-auto p-6 space-y-6">
                        <template x-for="msg in messages" :key="msg.id">
                            <div x-show="!lockdownActive || (lockdownActive && msg.username === 'DIRECTORATE')"
                                 :class="msg.username === 'DIRECTORATE' ? 'ml-auto items-end' : 'mr-auto items-start'" 
                                 class="group max-w-[85%] flex flex-col gap-1">
                                <div class="flex items-center gap-1.5 px-2">
                                    <template x-if="username === 'DIRECTORATE'"><button @click="deleteMessage(msg.id)" class="opacity-0 group-hover:opacity-100 text-red-500 mr-1"><i data-lucide="trash-2" size="10"></i></button></template>
                                    <template x-if="msg.username === 'DIRECTORATE'"><img src="1000219947.png" class="h-4 w-4 gold-glow"></template>
                                    <span class="text-[7px] font-black uppercase tracking-widest text-zinc-500" x-text="msg.username"></span>
                                </div>
                                <div :class="msg.username === 'DIRECTORATE' ? 'bg-gold/10 border-gold/20' : 'bg-white/5 border-white/5'" class="p-4 border rounded-2xl text-sm text-white" x-text="msg.content"></div>
                            </div>
                        </template>
                    </div>
                    <form @submit.prevent="send()" class="p-5 bg-black/40 border-t border-gold/10 flex gap-4">
                        <input x-model="msgInput" placeholder="COMMAND UPLINK..." class="flex-grow bg-transparent text-sm text-white outline-none">
                        <button type="submit" class="text-gold active:scale-90 transition-all"><i data-lucide="send-horizontal"></i></button>
                    </form>
                </div>
            </main>
            
            <footer class="fixed bottom-0 w-full glass border-t border-gold/20 p-4 flex justify-between items-center h-16 z-[60]">
                <p class="terminal-font text-[7px] font-black uppercase text-gold/80" x-text="systemLog"></p>
                <div class="flex gap-4 sm:gap-6 px-4 border-l border-gold/10 text-white/40">
                    <a href="mailto:director.mog@gmail.com"><i data-lucide="mail" size="18"></i></a>
                    <a href="https://instagram.com/ministryofgroove_hq" target="_blank"><i data-lucide="instagram" size="18"></i></a>
                    <a href="https://tiktok.com/@ministryofgroove" target="_blank"><i data-lucide="music-2" size="18"></i></a>
                    <a href="https://www.facebook.com/share/1HT1J3Kazp/" target="_blank"><i data-lucide="facebook" size="18"></i></a>
                    <a href="https://www.youtube.com/@MinistryofGroove-m1q" target="_blank"><i data-lucide="youtube" size="18"></i></a>
                </div>
            </footer>
        </div>
    </template>

    <script>
        function ministry() {
            return {
                view: 'auth', subView: 'chat', username: 'GUEST_SIGNAL', messages: [], msgInput: '', systemLog: '[OFFLINE]', 
                showRules: false, isLive: false, lockdownActive: false, unreadCount: 0,
                async init() {
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    const saved = localStorage.getItem('mog_handle');
                    if(saved) { 
                        this.username = saved; this.view = 'grid'; 
                        this.showRules = !localStorage.getItem('mog_rules_accepted');
                        this.systemLog = `[RECONNECTED: ${this.username}]`;
                    }
                    this.fetch(); this.syncSystem();
                    setInterval(() => { this.updateClock(); if(this.view === 'grid') this.registerPresence(); }, 1000);
                    this.updateWeather();
                    lucide.createIcons();
                },
                initializeUser() {
                    const handle = document.getElementById('user-handle').value.trim();
                    if(!handle) return;
                    this.username = handle.toUpperCase();
                    localStorage.setItem('mog_handle', this.username);
                    this.view = 'grid'; this.showRules = true; this.registerPresence();
                    this.supabase.from('messages').insert([{ content: `[NEW_SIGNAL_DETECTED]: OPERATIVE ${this.username} HAS ENTERED THE GRID.`, username: 'SYSTEM_BOT' }]);
                    this.systemLog = `[WELCOME ${this.username}]`;
                },
                acceptProtocols() { localStorage.setItem('mog_rules_accepted', 'true'); this.showRules = false; this.systemLog = `[PROTCOLS_SYNCED]`; },
                bypass() { 
                    this.username = 'DIRECTORATE'; localStorage.setItem('mog_handle', 'DIRECTORATE'); 
                    localStorage.setItem('mog_rules_accepted', 'true'); localStorage.setItem('isDirector', 'true'); 
                    this.view = 'grid'; this.registerPresence(); this.systemLog = '[BYPASS_SUCCESS]';
                    const audio = new Audio('https://www.soundjay.com/buttons/sounds/button-20.mp3'); audio.play().catch(() => {});
                },
                async registerPresence() {
                    const sessionID = localStorage.getItem('sessionID') || Math.random().toString(36).substring(7);
                    localStorage.setItem('sessionID', sessionID);
                    await this.supabase.from('presence').upsert({ id: sessionID, username: this.username, last_seen: new Date().toISOString() });
                },
                updateClock() { document.getElementById('sast-clock').innerText = new Date().toLocaleTimeString('en-GB', { timeZone: 'Africa/Johannesburg' }); },
                async updateWeather() {
                    try {
                        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-25.8728&longitude=29.2315&current_weather=true');
                        const data = await res.json();
                        document.getElementById('weather-display').innerText = `${Math.round(data.current_weather.temperature)}°C • EMALAHLENI`;
                    } catch(e) { }
                },
                async syncSystem() {
                    const { data } = await this.supabase.from('system_status').select('*');
                    this.isLive = data.find(i => i.id === 'livestream')?.is_active;
                    this.lockdownActive = data.find(i => i.id === 'lockdown')?.is_active;
                    this.supabase.channel('sys').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'system_status' }, (p) => {
                        if(p.new.id === 'livestream') this.isLive = p.new.is_active;
                        if(p.new.id === 'lockdown') this.lockdownActive = p.new.is_active;
                    }).subscribe();
                },
                async fetch() { const { data } = await this.supabase.from('messages').select('*').order('created_at', { ascending: true }); this.messages = data || []; },
                async send() { if(!this.msgInput.trim()) return; await this.supabase.from('messages').insert([{ content: this.msgInput.toUpperCase(), username: this.username }]); this.msgInput = ''; this.fetch(); },
                async deleteMessage(id) { if(confirm("REDACT SIGNAL?")) { await this.supabase.from('messages').delete().eq('id', id); this.fetch(); } }
            }
        }
    </script>
</body>
</html>
