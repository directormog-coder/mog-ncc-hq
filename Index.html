<body x-data="ministry()" x-init="init()" x-cloak>

    <template x-if="view === 'auth'">
        <div class="h-screen w-full flex flex-col items-center justify-center bg-black p-10 text-center animate-in fade-in duration-1000">

    </template>

    <template x-if="view === 'grid'">
        <div class="min-h-screen flex flex-col relative animate-in fade-in duration-500 pb-[100px]" :class="isLockdown ? 'pt-10' : ''">
            
            <header class="p-6 border-b border-gold/10 glass flex justify-between items-center sticky top-0 z-50">

                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden sm:block text-right">

                    </div>
                    <button @click="logout()" class="p-2 border border-red-900/30 text-red-500 rounded-lg"><i data-lucide="power" size="16"></i></button>
                </div>
            </header>

            <main class="p-6 space-y-6 max-w-5xl mx-auto w-full overflow-y-auto">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div @click="subView = 'chat'" :class="subView === 'chat' ? 'border-blue-400 bg-blue-400/10 shadow-[0_0_15px_rgba(96,165,250,0.2)]' : 'border-gold/10'" class="glass p-6 sm:p-8 rounded-[2rem] text-center cursor-pointer border transition-all">
                        <i data-lucide="message-square" class="mx-auto mb-2 text-blue-400"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest text-white">Grid</span>
                    </div>
                    <div @click="window.location.href='dossier.html'" class="glass p-6 sm:p-8 rounded-[2rem] text-center cursor-pointer border border-gold/10 hover:border-green-400/30">
                        <i data-lucide="user-cog" class="mx-auto mb-2 text-green-400"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest text-white">Dossier</span>
                    </div>
                    <div @click="subView = 'gallery'" :class="subView === 'gallery' ? 'border-purple-400 bg-purple-400/10 shadow-[0_0_15px_rgba(192,132,252,0.2)]' : 'border-gold/10'" class="glass p-6 sm:p-8 rounded-[2rem] text-center cursor-pointer border transition-all">
                        <i data-lucide="camera" class="mx-auto mb-2 text-purple-400"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest text-white">Gallery</span>
                    </div>
                    <div @click="window.location.href='archives.html'" class="glass p-6 sm:p-8 rounded-[2rem] text-center cursor-pointer border border-gold/10 hover:border-gold/50">
                        <i data-lucide="database" class="mx-auto mb-2 text-gold"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest text-white">Vault</span>
                    </div>
                </div>

                <div x-show="subView === 'chat'" class="glass rounded-[3rem] h-[45vh] flex flex-col overflow-hidden border-white/5">
                    <div id="chat-stream" class="flex-grow overflow-y-auto p-6 space-y-4">
                        <template x-for="msg in messages" :key="msg.id">
                            <div :class="msg.username === 'DIRECTORATE' ? 'ml-auto items-end' : 'mr-auto items-start'" class="flex flex-col gap-1 max-w-[85%] animate-in slide-in-from-bottom-2">
                                <div class="flex items-center gap-1">
                                    <template x-if="msg.username === 'DIRECTORATE'"><img src="1000219947.png" class="h-3 w-3 gold-glow rounded-full"></template>
                                    <span class="text-[7px] font-black text-zinc-500 px-2 uppercase" x-text="msg.username"></span>
                                </div>
                                <div :class="msg.username === 'DIRECTORATE' ? 'bg-gold/10 border-gold/20 text-white' : 'bg-white/5 border-white/5 text-white/80'" class="p-4 border rounded-2xl text-[12px]" x-text="msg.content"></div>
                            </div>
                        </template>
                    </div>
                    <form @submit.prevent="send()" class="p-4 bg-black/40 border-t border-gold/10 flex gap-3">
                        <input x-model="msgInput" placeholder="COMMAND UPLINK..." class="flex-grow bg-transparent text-[12px] text-white outline-none terminal-font">
                        <button type="submit" class="text-gold active:scale-90 transition-all"><i data-lucide="send-horizontal"></i></button>
                    </form>
                </div>

                <div x-show="subView === 'gallery'" class="glass rounded-[3rem] h-[45vh] flex flex-col overflow-hidden border-white/5 p-6">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <h3 class="text-[10px] font-black uppercase tracking-widest text-white italic">Visual Archives</h3>
                        <label class="cursor-pointer bg-gold text-black px-4 py-2 rounded-full text-[8px] font-black uppercase active:scale-95 transition-all shadow-lg">
                            <i data-lucide="upload" size="12" class="inline mr-1"></i> Transmit Asset
                            <input type="file" @change="uploadImage" class="hidden" accept="image/*">
                        </label>
                    </div>
                    <div class="gallery-grid overflow-y-auto flex-grow pr-2">
                        <template x-for="img in galleryItems" :key="img.id">
                            <div class="relative aspect-square rounded-2xl overflow-hidden glass group border border-white/10">
                                <img :src="img.url" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700">
                                <div class="absolute bottom-0 w-full p-2 bg-black/70 opacity-0 group-hover:opacity-100 transition-all">
                                    <p class="text-[6px] text-white truncate uppercase terminal-font" x-text="img.owner"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </main>
            
            <footer class="glass border-t border-gold/20 flex flex-col sm:flex-row justify-between items-center px-6 py-4 gap-4 sm:gap-0 fixed bottom-0 w-full left-0">
                <div class="flex flex-col items-center sm:items-start gap-1">
                    <p class="terminal-font text-[7px] font-black uppercase text-gold/60">© 2026 MINISTRY OF GROOVE</p>
                    <div class="flex gap-3 text-[6px] font-black uppercase tracking-widest text-gold/30">
                        <a href="tos.html" class="hover:text-gold transition-colors">Protocol TOS</a>
                        <span>|</span>
                        <a href="privacy.html" class="hover:text-gold transition-colors">Privacy Shield</a>
                    </div>
                </div>
                <div class="flex gap-6 text-white/40">
                    <a href="mailto:director.mog@gmail.com"><i data-lucide="mail" size="20"></i></a>
                    <a href="https://instagram.com/ministryofgroove_hq" target="_blank"><i data-lucide="instagram" size="20"></i></a>
                    <a href="https://tiktok.com/@ministryofgroove" target="_blank"><i data-lucide="music-2" size="20"></i></a>
                    <a href="https://www.facebook.com/share/1HT1J3Kazp/" target="_blank"><i data-lucide="facebook" size="20"></i></a>
                    <a href="https://www.youtube.com/@MinistryofGroove-m1q" target="_blank"><i data-lucide="youtube" size="20"></i></a>
                </div>
            </footer>
        </div>
    </template>

    <script>
        const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        // UPGRADE: Inbox Logic
        function inbox() {
            return {
                hasNewMessage: false, latestMessage: '',
                async init() {
                    const handle = localStorage.getItem('mog_handle');
                    if(!handle) return;
                    const { data } = await supabase.from('direct_messages').select('*').eq('recipient', handle).eq('is_read', false).order('created_at', { ascending: false }).limit(1);
                    if (data?.length) { this.latestMessage = data[0].content; this.hasNewMessage = true; }
                    supabase.channel('dm_sync').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'direct_messages', filter: `recipient=eq.${handle}` }, payload => {
                        this.latestMessage = payload.new.content; this.hasNewMessage = true;
                    }).subscribe();
                },
                dismiss() { this.hasNewMessage = false; }
            }
        }

        // UPGRADE: Warning System Logic
        function warningSystem() {
            return {
                showWarning: false, warningMsg: '',
                init() {
                    const handle = localStorage.getItem('mog_handle');
                    if(!handle) return;
                    supabase.channel('warning_sync').on('postgres_changes', { 
                        event: 'INSERT', schema: 'public', table: 'warnings', filter: `recipient=eq.${handle}` 
                    }, payload => {
                        this.warningMsg = payload.new.message.toUpperCase();
                        this.showWarning = true;
                    }).subscribe();
                },
                acknowledge() { this.showWarning = false; }
            }
        }

        function ministry() {
            return {
                view: 'auth', subView: 'chat', showBypass: false, dirEmail: '', dirPass: '', 
                username: '', handleInput: '', errorMsg: '', messages: [], msgInput: '', galleryItems: [], 
                isLockdown: false,
                
                async init() {
                    this.supabase = supabase;
                    const saved = localStorage.getItem('mog_handle');
                    if(saved) { this.username = saved; this.view = 'grid'; }
                    this.fetch(); 
                    this.fetchGallery();
                    this.subscribeRealtime();
                    setInterval(() => this.updateClock(), 1000);
                    setInterval(() => this.updatePresence(), 30000);
                    setTimeout(() => lucide.createIcons(), 500);
                },

                // UPGRADE: Real-time PostgreSQL Listeners
                subscribeRealtime() {
                    this.supabase.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                        this.messages.push(payload.new);
                        this.$nextTick(() => { const el = document.getElementById('chat-stream'); if(el) el.scrollTop = el.scrollHeight; });
                    }).subscribe();

                    this.supabase.channel('status').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'system_status' }, payload => {
                        if(payload.new.id === 'lockdown') this.isLockdown = payload.new.is_active;
                    }).subscribe();
                },

                async updatePresence() {
                    if (!this.username) return;
                    await this.supabase.from('presence').upsert({ username: this.username, last_seen: new Date().toISOString() }, { onConflict: 'username' });
                },

                executeBypass() {
                    if(this.dirEmail === 'director.mog@gmail.com' && this.dirPass === '@MOGProtocol2026') {
                        this.username = 'DIRECTORATE';
                        localStorage.setItem('mog_handle', 'DIRECTORATE');
                        this.view = 'grid';
                    } else { this.errorMsg = "INVALID DIRECTORATE SIGNAL"; }
                },

                initializeUser() {
                    if(!this.handleInput.trim()) { this.errorMsg = "ID REQUIRED"; return; }
                    this.username = this.handleInput.trim().toUpperCase();
                    localStorage.setItem('mog_handle', this.username);
                    this.view = 'grid';
                },

                async fetch() { 
                    const { data } = await this.supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
                    this.messages = data || [];
                    this.$nextTick(() => { const el = document.getElementById('chat-stream'); if(el) el.scrollTop = el.scrollHeight; });
                },

                async send() {
                    if(!this.msgInput.trim()) return;
                    await this.supabase.from('messages').insert([{ content: this.msgInput.toUpperCase(), username: this.username }]);
                    this.msgInput = '';
                },

                async fetchGallery() {
                    const { data } = await this.supabase.from('gallery').select('*').order('created_at', { ascending: false });
                    this.galleryItems = data || [];
                },

                // UPGRADE: Image Compression before Upload
                async uploadImage(e) {
                    const file = e.target.files[0];
                    if(!file) return;
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = async () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 1024;
                            const scaleSize = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scaleSize;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            canvas.toBlob(async (blob) => {
                                const compressedFile = new File([blob], file.name, { type: "image/jpeg" });
                                const fileName = `${Date.now()}-${this.username}`;
                                const { data } = await this.supabase.storage.from('gallery').upload(fileName, compressedFile);
                                if(data) {
                                    const { data: { publicUrl } } = this.supabase.storage.from('gallery').getPublicUrl(fileName);
                                    await this.supabase.from('gallery').insert([{ url: publicUrl, owner: this.username }]);
                                    this.fetchGallery();
                                }
                            }, 'image/jpeg', 0.7);
                        };
                    };
                },

                updateClock() {
                    const now = new Date();
                    const clockEl = document.getElementById('sast-clock');
                    if(clockEl) clockEl.innerText = now.toLocaleTimeString('en-GB', { timeZone: 'Africa/Johannesburg' });
                    fetch('https://api.open-meteo.com/v1/forecast?latitude=-25.8728&longitude=29.2315&current_weather=true').then(r=>r.json()).then(d=>{
                        const weatherEl = document.getElementById('weather-display');
                        if(weatherEl) weatherEl.innerText = `${Math.round(d.current_weather.temperature)}°C • EMALAHLENI`;
                    }).catch(()=>{});
                },
                logout() { localStorage.removeItem('mog_handle'); location.reload(); }
            }
        }
    </script>
</body>
