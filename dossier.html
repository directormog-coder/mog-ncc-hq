<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>OPERATIVE DOSSIER | MOG NCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(212, 175, 55, 0.15); backdrop-filter: blur(10px); }
        .terminal-font { font-family: 'JetBrains Mono', monospace; }
        .gold-glow { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
    </style>
</head>
<body x-data="dossier()" x-init="init()" class="p-6 pb-32 animate-in slide-in-from-right-4 duration-500">

    <header class="flex justify-between items-center mb-10 sticky top-0 z-50 py-2">
        <button onclick="window.location.href='index.html'" class="p-3 glass rounded-2xl active:scale-90 transition-all">
            <i data-lucide="chevron-left"></i>
        </button>
        <div class="text-right">
            <h1 class="text-[10px] font-black uppercase tracking-[0.4em] text-white">Operative Dossier</h1>
            <p class="text-[7px] text-gold/40 uppercase font-black tracking-widest italic">Identity Authenticated</p>
        </div>
    </header>

    <main class="max-w-xl mx-auto space-y-6">
        <div class="glass p-8 rounded-[3rem] border-gold/20 relative overflow-hidden">
             <div class="flex items-center gap-6 relative z-10">
                <div class="h-16 w-16 sm:h-20 sm:w-20 rounded-full border-2 border-gold/30 flex items-center justify-center bg-gold/5 shadow-[0_0_15px_rgba(212,175,55,0.1)]">
                    <i data-lucide="user" size="32" class="text-gold/50"></i>
                </div>
                <div>
                    <h2 class="text-lg sm:text-xl font-black uppercase tracking-tighter text-white italic" x-text="handle"></h2>
                    <p class="text-[8px] font-black uppercase text-gold/60 tracking-widest mt-1" x-text="rank"></p>
                </div>
            </div>
            <button @click="shareStats()" class="absolute top-6 right-6 text-gold/40 hover:text-gold transition-colors">
                <i data-lucide="share-2" size="16"></i>
            </button>
        </div>

        <div class="glass p-8 rounded-[3rem] border-white/5">
            <h3 class="text-[9px] font-black uppercase mb-6 text-white tracking-widest flex items-center gap-2">
                <i data-lucide="trophy" size="14" class="text-gold"></i> Grid Leaderboard
            </h3>
            <div class="space-y-3">
                <template x-for="(leader, index) in leaderboard">
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5 transition-all">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-black text-gold/40 terminal-font" x-text="'#' + (index + 1)"></span>
                            <span class="text-[10px] font-bold text-white uppercase" x-text="leader.username"></span>
                        </div>
                        <span class="text-[8px] font-black text-gold/60 uppercase" x-text="leader.count + ' SIGS'"></span>
                    </div>
                </template>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-6 rounded-[2.5rem] text-center border-white/5">
                <p class="text-[7px] font-black uppercase text-gold/40 mb-1">Total Signals</p>
                <p class="text-2xl font-black text-white terminal-font" x-text="msgCount">0</p>
            </div>
            <div class="glass p-6 rounded-[2.5rem] text-center border-white/5">
                <p class="text-[7px] font-black uppercase text-gold/40 mb-1">Status</p>
                <p class="text-[10px] font-black text-green-500 uppercase tracking-widest mt-2">ACTIVE</p>
            </div>
        </div>
    </main>

    <div x-show="toast" x-transition class="fixed bottom-24 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-full border-gold/50 z-[100]">
        <p class="text-[8px] font-black uppercase text-gold tracking-widest" x-text="toastMsg"></p>
    </div>

    <script>
        function dossier() {
            return {
                handle: 'UNIDENTIFIED', msgCount: 0, rank: 'GRID INITIATE', 
                myMessages: [], leaderboard: [], toast: false, toastMsg: '',
                async init() {
                    const saved = localStorage.getItem('mog_handle');
                    if(!saved) window.location.href = 'index.html';
                    this.handle = saved;
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    await this.fetchActivity();
                    await this.fetchLeaderboard();
                    lucide.createIcons();
                },
                formatDate(iso) { return new Date(iso).toLocaleString('en-GB', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' }); },
                async fetchActivity() {
                    const { data } = await this.supabase.from('messages').select('*').eq('username', this.handle);
                    this.myMessages = data || [];
                    this.msgCount = this.myMessages.length;
                    if (this.handle === 'DIRECTORATE') this.rank = 'THE DIRECTOR';
                    else if (this.msgCount > 50) this.rank = 'ELITE SIGNAL';
                    else if (this.msgCount > 10) this.rank = 'VETERAN GUEST';
                    else this.rank = 'GRID INITIATE';
                },
                async fetchLeaderboard() {
                    const { data } = await this.supabase.from('messages').select('username');
                    const counts = data.reduce((acc, curr) => {
                        if (curr.username === 'SYSTEM_BOT' || curr.username === 'DIRECTORATE') return acc;
                        acc[curr.username] = (acc[curr.username] || 0) + 1;
                        return acc;
                    }, {});
                    this.leaderboard = Object.entries(counts).map(([username, count]) => ({ username, count }))
                        .sort((a, b) => b.count - a.count).slice(0, 5);
                },
                shareStats() {
                    const text = `OPERATIVE: ${this.handle}\nRANK: ${this.rank}\nSIGNALS: ${this.msgCount}\nACCESS THE GRID: ${window.location.origin}`;
                    navigator.clipboard.writeText(text);
                    this.toastMsg = 'SIGNAL COPIED TO CLIPBOARD';
                    this.toast = true;
                    setTimeout(() => this.toast = false, 3000);
                }
            }
        }
    </script>
</body>
    </html>
