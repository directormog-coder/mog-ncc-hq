<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>OPERATIVE DOSSIER | MOG NCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (!localStorage.getItem('mog_handle')) window.location.href = 'index.html';
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="dossier()" x-init="init()" class="bg-black text-gold p-6">
    <div class="scanline"></div>
    <main class="max-w-xl mx-auto space-y-6">
        <header class="flex justify-between items-center glass p-4 rounded-2xl">
            <button onclick="window.location.href='index.html'" class="text-white"><i data-lucide="chevron-left"></i></button>
            <h1 class="text-[10px] font-black uppercase tracking-[0.4em] text-white">Operative Dossier</h1>
        </header>

        <div class="glass p-8 rounded-[3.5rem] border-gold/20 flex items-center gap-6">
            <div class="h-20 w-20 rounded-full bg-gold/5 flex items-center justify-center border-2 border-gold/30">
                <i data-lucide="user" size="32" class="text-gold/50"></i>
            </div>
            <div>
                <h2 class="text-xl font-black uppercase text-white italic" x-text="handle"></h2>
                <p class="text-[8px] font-black uppercase text-gold" x-text="rank"></p>
            </div>
        </div>
    </main>

    <script>
        function dossier() {
            return {
                handle: 'GUEST_USER', rank: 'GRID_INITIATE',
                async init() {
                    this.handle = localStorage.getItem('mog_handle') || 'GUEST';
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    const { count: msgs } = await this.supabase.from('messages').select('*', { count: 'exact', head: true }).eq('username', this.handle);
                    this.rank = (msgs || 0) > 50 ? 'ELITE_OPERATIVE' : 'FIELD_AGENT';
                    lucide.createIcons();
                }
            }
        }
    </script>
</body>
</html>
