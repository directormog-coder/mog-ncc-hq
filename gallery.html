<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY GALLERY | VISUAL ARCHIVES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // MINISTRY_SECURITY_PROTOCOL: Redirect unauthorized signals
        if (!localStorage.getItem('mog_handle')) {
            window.location.href = 'index.html';
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-gold p-6 pb-24">
    <div class="scanline"></div>
    <header class="flex justify-between items-center mb-10">
        <button onclick="window.location.href='index.html'" class="p-3 glass rounded-2xl active:scale-90 transition-all"><i data-lucide="arrow-left" size="18"></i></button>
        <div class="text-right">
            <h1 class="text-[10px] font-black uppercase tracking-[0.5em] text-white">System Visuals</h1>
            <p class="text-[7px] text-gold/40 uppercase font-black tracking-widest">Public Frequency</p>
        </div>
    </header>
    <script>lucide.createIcons();</script>
</body>
</html>
