<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>VISUAL ARCHIVES | MOG GALLERY</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const handle = localStorage.getItem('mog_handle');
        if (handle) {
            const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
            const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
            const sb = window.supabase.createClient(SB_URL, SB_KEY);
            sb.from('blacklisted_operatives').select('*').eq('username', handle).single()
              .then(({data}) => {
                  if(data) {
                      localStorage.clear();
                      window.location.href = '404.html';
                  }
              });
        } else {
            window.location.href = 'index.html';
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
        .glass { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.15); }
        .gold-glow { filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.4)); }
        .terminal-font { font-family: 'JetBrains Mono', monospace; }
        [x-cloak] { display: none !important; }
        
        /* Grid Layout */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        
        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 9999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="gallery()" x-init="init()" class="bg-black text-gold p-6 pb-24" x-cloak>
    <div class="scanline"></div>

    <header class="mb-10 flex items-center justify-between sticky top-0 z-50 py-2 glass px-4 rounded-2xl border-none">
        <button onclick="window.location.href='index.html'" class="p-3 glass rounded-2xl active:scale-90 transition-all">
            <i data-lucide="chevron-left" size="20"></i>
        </button>
        <div class="text-right mr-2">
            <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">Archives</h1>
            <p class="text-[7px] uppercase tracking-[0.4em] text-gold/40 font-black">Visual Repository</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto space-y-8 animate-in fade-in duration-700">
        
        <div class="glass p-8 rounded-[3rem] border-gold/10 flex flex-col items-center text-center space-y-4">
            <div class="space-y-2">
                <i data-lucide="camera" class="mx-auto text-gold/20" size="40"></i>
                <h3 class="text-[10px] font-black uppercase text-white tracking-widest">Transmit Asset</h3>
                <p class="text-[7px] text-zinc-500 uppercase max-w-[180px] mx-auto">Upload new visual data to the Ministry's shared grid.</p>
            </div>
            
            <label class="w-full max-w-xs py-5 bg-gold text-black font-black text-[10px] uppercase rounded-2xl shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-all cursor-pointer">
                <i data-lucide="upload" size="16"></i> 
                <span x-text="uploading ? 'TRANSMITTING...' : 'CHOOSE ASSET'"></span>
                <input type="file" @change="uploadImage" class="hidden" accept="image/*" :disabled="uploading">
            </label>
        </div>

        <div class="gallery-grid">
            <template x-for="img in galleryItems" :key="img.id">
                <div class="relative aspect-square rounded-2xl overflow-hidden glass border border-white/10 group cursor-pointer" @click="selectedImg = img.url">
                    <img :src="img.url" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700 ease-in-out">
                    <div class="absolute bottom-0 w-full p-2 bg-black/60 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
                        <p class="text-[7px] text-white font-black uppercase terminal-font truncate" x-text="img.owner"></p>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="selectedImg" class="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-black/95 backdrop-blur-xl" @click="selectedImg = null">
            <div class="max-w-3xl w-full relative">
                <img :src="selectedImg" class="w-full h-auto rounded-3xl border border-gold/20 shadow-2xl">
                <button class="absolute -top-12 right-0 text-white p-2"><i data-lucide="x" size="32"></i></button>
            </div>
        </div>

    </main>

    <script>
        function gallery() {
            return {
                handle: '',
                galleryItems: [],
                uploading: false,
                selectedImg: null,
                
                async init() {
                    this.handle = localStorage.getItem('mog_handle') || 'ANONYMOUS';
                    
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);

                    await this.fetchGallery();
                    this.subscribe();
                    lucide.createIcons();
                },

                async fetchGallery() {
                    const { data } = await this.supabase
                        .from('gallery')
                        .select('*')
                        .order('created_at', { ascending: false });
                    this.galleryItems = data || [];
                },

                subscribe() {
                    this.supabase.channel('gallery_realtime').on('postgres_changes', { 
                        event: 'INSERT', schema: 'public', table: 'gallery' 
                    }, payload => {
                        this.galleryItems.unshift(payload.new);
                    }).subscribe();
                },

                async uploadImage(e) {
                    const file = e.target.files[0];
                    if(!file) return;
                    this.uploading = true;

                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = async () => {
                            // UPGRADE: Image Compression (Client-side)
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 1280;
                            const scaleSize = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scaleSize;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            
                            canvas.toBlob(async (blob) => {
                                const compressedFile = new File([blob], file.name, { type: "image/jpeg" });
                                const fileName = `${Date.now()}-${this.handle.replace(/\s+/g, '_')}`;
                                
                                // Upload to Supabase Storage
                                const { data: uploadData, error: uploadError } = await this.supabase.storage
                                    .from('gallery')
                                    .upload(fileName, compressedFile);

                                if(uploadData) {
                                    const { data: { publicUrl } } = this.supabase.storage.from('gallery').getPublicUrl(fileName);
                                    
                                    // Insert into Gallery table
                                    await this.supabase.from('gallery').insert([
                                        { url: publicUrl, owner: this.handle }
                                    ]);
                                    
                                    this.uploading = false;
                                } else {
                                    console.error("Upload failed:", uploadError);
                                    this.uploading = false;
                                }
                            }, 'image/jpeg', 0.8);
                        };
                    };
                }
            }
        }
    </script>
</body>
</html>
