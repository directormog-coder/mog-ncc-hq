<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY GALLERY | NCC VISUALS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .gold-glow { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-12">
        <button onclick="window.location.href='index.html'" class="p-4 glass rounded-2xl active:scale-90 transition-transform">
            <i data-lucide="arrow-left" size="20"></i>
        </button>
        <h1 class="text-[10px] font-black uppercase tracking-[0.5em] text-white/50">System Visuals</h1>
        <div class="w-12"></div>
    </header>

    <div class="grid grid-cols-2 gap-4 max-w-2xl mx-auto">
        <div class="glass aspect-square rounded-[2.5rem] flex flex-col items-center justify-center p-6 border-gold/5 hover:border-gold/40 transition-all">
            <img src="logo.png" class="w-24 h-24 object-contain gold-glow mb-4">
            <span class="text-[8px] font-black uppercase opacity-40 tracking-widest">Master Emblem</span>
        </div>

        <div class="glass aspect-square rounded-[2.5rem] flex items-center justify-center border-dashed border-gold/10">
            <div class="text-center opacity-20">
                <i data-lucide="plus" class="mx-auto mb-2"></i>
                <p class="text-[7px] uppercase font-black tracking-widest">Uplink Pending</p>
            </div>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
