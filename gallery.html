<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINISTRY GALLERY | NCC VISUALS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-10">
        <button onclick="window.location.href='index.html'" class="text-gold"><i data-lucide="arrow-left"></i></button>
        <h1 class="text-[10px] font-black uppercase tracking-[0.5em]">Visual Archives</h1>
        <div class="w-6"></div>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
        <div class="glass aspect-square rounded-2xl overflow-hidden group border-gold/10 hover:border-gold transition-all">
            <img src="logo.png" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 transition-opacity">
        </div>
        <div class="glass aspect-square rounded-2xl flex items-center justify-center border-dashed border-gold/20">
            <span class="text-[8px] uppercase opacity-30">Uplinking...</span>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
