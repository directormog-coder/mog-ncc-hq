<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY GALLERY | VISUAL ARCHIVES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
    </style>
    <link rel="stylesheet" href="index.css">
    <style>
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .director-border { border: 1px solid rgba(212, 175, 55, 0.4); box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
        .terminal-font { font-family: 'JetBrains Mono', monospace; }
        .gold-glow { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
    </style>
</head>
<body class="p-6 pb-24">
    <header class="flex justify-between items-center mb-10">
        <button onclick="window.location.href='index.html'" class="p-3 glass rounded-2xl active:scale-90 transition-all"><i data-lucide="arrow-left" size="18"></i></button>
        <div class="text-right">
            <h1 class="text-[10px] font-black uppercase tracking-[0.5em] text-white">System Visuals</h1>
            <p class="text-[7px] text-gold/40 uppercase font-black tracking-widest">Public Frequency</p>
        </div>
    </header>

    <div class="space-y-10 max-w-2xl mx-auto">
        <div class="grid grid-cols-2 gap-4">
            <div class="glass aspect-square rounded-[2.5rem] p-6 flex flex-col items-center justify-center">
                <img src="logo.png" class="w-20 h-20 object-contain opacity-60 mb-3">
                <span class="text-[6px] font-black uppercase opacity-30 tracking-widest text-white">Ministry Mark</span>
            </div>
            <div class="glass aspect-square rounded-[2.5rem] flex items-center justify-center border-dashed border-gold/10"><i data-lucide="plus" class="opacity-10"></i></div>
        </div>

        <div id="director-wing" style="display: none;" class="animate-in fade-in slide-in-from-bottom-4 duration-1000">
            <div class="flex items-center gap-3 mb-6"><img src="1000219947.png" class="h-6 w-6 gold-glow"><h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-gold">Director's Private Wing</h2></div>
            <div class="space-y-6">
                <div class="glass director-border p-8 rounded-[3rem] text-center relative overflow-hidden"><i data-lucide="shield-check" class="mx-auto mb-4 text-gold/40" size="32"></i><p class="text-[9px] font-black uppercase tracking-widest text-white">Classified Schematics</p><p class="text-[6px] opacity-20 uppercase mt-1">Uplink: Secure</p></div>
                <div class="space-y-3">
                    <div class="flex justify-between items-center px-2"><span class="text-[8px] font-black uppercase tracking-widest">Encrypted Memo</span><button onclick="clearMemo()" class="text-[6px] text-red-500/50 uppercase font-black">Wipe Data</button></div>
                    <div class="glass director-border p-5 rounded-[2rem]"><textarea id="memo-field" class="w-full bg-transparent border-none outline-none text-[10px] text-zinc-300 terminal-font min-h-[150px]" placeholder="DEPOSIT THOUGHTS..." oninput="saveMemo(this.value)"></textarea></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        if (localStorage.getItem('isDirector') === 'true') document.getElementById('director-wing').style.display = 'block';
        const memoField = document.getElementById('memo-field');
        if (memoField) memoField.value = localStorage.getItem('directorMemo') || '';
        function saveMemo(text) { localStorage.setItem('directorMemo', text); }
        function clearMemo() { if(confirm("WIPE DATA?")) { if(memoField) memoField.value = ''; localStorage.removeItem('directorMemo'); } }
    </script>
</body>
</html>
