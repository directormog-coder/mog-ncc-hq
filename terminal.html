<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>DIRECTORATE TERMINAL | MOG HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(212, 175, 55, 0.15); backdrop-filter: blur(15px); }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="terminal()" x-init="init()" class="bg-black text-gold p-6">
    <div class="scanline"></div>

    <template x-if="!authenticated">
        <div class="h-screen flex flex-col items-center justify-center p-10 text-center">
            <h2 class="text-xs font-black uppercase text-white mb-6">Directorate Secure Access</h2>
            <input x-model="loginEmail" type="email" placeholder="DIRECTOR_ID..." class="w-full max-w-xs bg-white/5 border border-gold/20 p-5 rounded-2xl text-white text-center mb-4 outline-none">
            <input x-model="loginPass" type="password" placeholder="PROTOCOL_KEY..." class="w-full max-w-xs bg-white/5 border border-gold/20 p-5 rounded-2xl text-white text-center mb-6 outline-none">
            <button @click="verifyAccess()" class="w-full max-w-xs py-5 bg-gold text-black font-black rounded-full uppercase">Authorize</button>
        </div>
    </template>

    <template x-if="authenticated">
        <div class="max-w-2xl mx-auto space-y-6 animate-in fade-in">
            <header class="flex justify-between items-center glass p-4 rounded-2xl">
                <h1 class="font-black italic text-white uppercase tracking-tighter">MOG_COMMAND</h1>
                <button @click="logout()" class="text-red-500"><i data-lucide="log-out"></i></button>
            </header>

            <section class="glass p-8 rounded-[3rem] border-gold/20">
                <h3 class="text-[9px] font-black uppercase text-white mb-4 italic">Direct Operative Uplink</h3>
                <div class="space-y-3">
                    <input x-model="dmRecipient" placeholder="RECIPIENT_ID..." class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white outline-none uppercase">
                    <textarea x-model="dmContent" placeholder="INSTRUCTION..." class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white outline-none"></textarea>
                    <button @click="sendDM()" class="w-full py-4 bg-white text-black font-black text-[9px] uppercase rounded-full">Transmit Signal</button>
                </div>
            </section>

            <section class="glass p-6 rounded-[2.5rem]">
                <h2 class="text-[9px] font-black uppercase text-white mb-4 italic tracking-widest text-center">Instruction History</h2>
                <div class="space-y-2 max-h-[200px] overflow-y-auto">
                    <template x-for="log in logItems" :key="log.id">
                        <div class="p-3 bg-white/5 border-l border-gold/50 flex justify-between rounded-r-lg">
                            <span class="text-gold text-[8px] font-bold" x-text="'TO: ' + log.recipient"></span>
                            <span class="text-white/80 text-[8px]" x-text="log.content"></span>
                        </div>
                    </template>
                </div>
            </section>
        </div>
    </template>

    <script>
        const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        function terminal() {
            return {
                authenticated: false, loginEmail: '', loginPass: '', dmRecipient: '', dmContent: '', logItems: [],
                init() {
                    if(sessionStorage.getItem('mog_terminal_auth') === 'true') {
                        this.authenticated = true;
                        this.fetchLogs();
                    }
                    setTimeout(() => lucide.createIcons(), 200);
                },
                verifyAccess() {
                    if(this.loginEmail === 'director.mog@gmail.com' && this.loginPass === '@MOGProtocol2026') {
                        this.authenticated = true;
                        sessionStorage.setItem('mog_terminal_auth', 'true');
                        this.fetchLogs();
                    }
                },
                async fetchLogs() {
                    const { data } = await supabase.from('direct_messages').select('*').order('created_at', { ascending: false }).limit(10);
                    this.logItems = data || [];
                },
                async sendDM() {
                    if(!this.dmRecipient || !this.dmContent) return;
                    await supabase.from('direct_messages').insert([{ recipient: this.dmRecipient.toUpperCase(), content: this.dmContent.toUpperCase() }]);
                    this.dmRecipient = ''; this.dmContent = ''; this.fetchLogs();
                },
                logout() { sessionStorage.removeItem('mog_terminal_auth'); location.reload(); }
            }
        }
    </script>
</body>
</html>
