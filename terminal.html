<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>DIRECTORATE TERMINAL | MOG HQ</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="1000225933.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');</style>
    <link rel="stylesheet" href="style.css">
    
    <style>
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.15); }
        .gold-glow { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4)); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="terminal()" x-init="init()" x-cloak>

    <template x-if="!authenticated">
        <div class="h-screen w-full relative flex flex-col items-center justify-center overflow-hidden">
            <video autoplay muted loop playsinline class="absolute z-0 w-auto min-w-full min-h-full max-w-none opacity-20 grayscale">
                <source src="1000211769.mp4" type="video/mp4">
            </video>

            <div class="relative z-10 flex flex-col items-center p-10 glass rounded-[3rem] border-gold/20 max-w-xs w-full">
                <img src="1000225933.jpg" class="h-24 w-24 mb-10 gold-glow rounded-full">
                <div class="w-full space-y-4 text-center">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.4em] mb-6 text-white">Directorate Terminal</h2>
                    <input x-model="loginEmail" type="email" placeholder="DIRECTOR_ID..." class="w-full bg-black/40 border border-gold/20 p-5 rounded-2xl text-[10px] text-white outline-none terminal-font text-center">
                    <input x-model="loginPass" type="password" placeholder="PROTOCOL_KEY..." class="w-full bg-black/40 border border-gold/20 p-5 rounded-2xl text-[10px] text-white outline-none terminal-font text-center">
                    <button @click="verifyAccess()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-full shadow-lg">Authorize</button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="authenticated">
        <div class="min-h-screen p-6 pb-[120px]">
            <header class="mb-10 flex items-center justify-between sticky top-0 z-50 py-2 glass px-4 rounded-2xl border-none">
                <div class="flex items-center gap-4">
                    <img src="1000225933.jpg" class="h-12 w-12 gold-glow rounded-full">
                    <h1 class="text-xl font-black uppercase tracking-tighter text-white italic">MOG_COMMAND</h1>
                </div>
                <button @click="logout()" class="p-3 glass rounded-2xl border-red-900/40 text-red-500"><i data-lucide="log-out" size="18"></i></button>
            </header>

            <main class="space-y-6 max-w-2xl mx-auto">
                <section class="glass p-6 rounded-[2.5rem]">
                    <h2 class="text-[9px] font-black uppercase tracking-widest text-white mb-4">Grid Operatives</h2>
                    <div class="space-y-2 max-h-40 overflow-y-auto">
                        <template x-for="op in operatives">
                            <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl">
                                <span class="text-[10px] font-bold text-white uppercase" x-text="op.username"></span>
                                <span class="h-2 w-2 rounded-full bg-green-500"></span>
                            </div>
                        </template>
                    </div>
                </section>

                <section class="glass p-8 rounded-[3rem]">
                    <h2 class="text-[10px] font-black uppercase text-white tracking-[0.2em] mb-6 text-center italic">Global Transmission</h2>
                    <div class="space-y-4">
                        <input x-model="bTitle" placeholder="HEADING..." class="w-full bg-black border border-gold/20 p-4 rounded-xl text-[10px] text-white uppercase outline-none terminal-font">
                        <textarea x-model="bMsg" placeholder="SIGNAL MESSAGE..." class="w-full bg-black border border-gold/20 p-4 rounded-xl text-[10px] text-white uppercase outline-none min-h-[100px] terminal-font"></textarea>
                        <button @click="broadcast()" class="w-full py-6 bg-gold text-black font-black text-[11px] uppercase rounded-full shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all">
                            <i data-lucide="zap" size="14"></i> Transmit Signal
                        </button>
                        <p x-text="status" class="text-[7px] text-center uppercase opacity-50 tracking-widest font-black h-2"></p>
                    </div>
                </section>
            </main>

            <footer class="glass border-t border-gold/20 flex flex-col sm:flex-row justify-between items-center px-6 py-4 fixed bottom-0 w-full left-0 z-[100]">
                <div class="flex flex-col items-center sm:items-start gap-1">
                    <p class="terminal-font text-[7px] font-black uppercase text-gold/60">© 2026 MINISTRY OF GROOVE</p>
                    <div class="flex gap-3 text-[6px] font-black uppercase tracking-widest text-gold/30">
                        <a href="tos.html">Protocol TOS</a> | <a href="privacy.html">Privacy Shield</a>
                    </div>
                </div>
            </footer>
        </div>
    </template>

    <script>
        function terminal() {
            return {
                authenticated: false, loginEmail: '', loginPass: '', 
                operatives: [], bTitle: '', bMsg: '', status: '',
                async init() {
                    if(sessionStorage.getItem('mog_terminal_auth') === 'true') {
                        this.authenticated = true;
                        this.setupSupabase();
                    }
                    setTimeout(() => lucide.createIcons(), 100);
                },
                verifyAccess() {
                    if(this.loginEmail === 'director.mog@gmail.com' && this.loginPass === '@MOGProtocol2026') {
                        this.authenticated = true;
                        sessionStorage.setItem('mog_terminal_auth', 'true');
                        this.setupSupabase();
                    }
                },
                logout() { sessionStorage.removeItem('mog_terminal_auth'); location.reload(); },
                setupSupabase() {
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    this.fetchPresence();
                    setInterval(() => this.fetchPresence(), 5000);
                    setTimeout(() => lucide.createIcons(), 200);
                },
                async fetchPresence() {
                    const { data } = await this.supabase.from('presence').select('*').gt('last_seen', new Date(Date.now() - 300000).toISOString());
                    this.operatives = data || [];
                },
                async broadcast() {
                    if(!this.bTitle || !this.bMsg) return;
                    this.status = "UPLINKING SIGNAL...";
                    const res = await fetch('https://onesignal.com/api/v1/notifications', {
                        method: 'POST',
                        headers: { 'Authorization': 'Basic Mzg0ZmI0MjUtYzYxZi00ODlhLWE1YzEtODQ1ZDQ4MDZiZWM4', 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            app_id: "3ef253d3-a093-42f5-bc88-91dd7576cf34",
                            included_segments: ["Total Subscriptions"],
                            headings: { "en": this.bTitle.toUpperCase() },
                            contents: { "en": this.bMsg.toUpperCase() }
                        })
                    });
                    if(res.ok) { this.status = "SIGNAL TRANSMITTED"; this.bTitle = ''; this.bMsg = ''; }
                }
            }
        }
    </script>
</body>
</html>
