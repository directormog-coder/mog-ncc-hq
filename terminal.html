<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>DIRECTORATE TERMINAL | MOG HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ZERO-CONFLICT SECURITY MIDDLEWARE
        const current_handle = localStorage.getItem('mog_handle');
        const isAuth = sessionStorage.getItem('mog_terminal_auth');
        if (current_handle) {
            const MOG_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
            const MOG_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
            const mog_sb = window.supabase.createClient(MOG_URL, MOG_KEY);
            mog_sb.from('blacklisted_operatives').select('*').eq('username', current_handle).single()
              .then(({data}) => {
                  if(data) { localStorage.clear(); window.location.href = '404.html'; }
              }).catch(err => console.log("Security Check Bypass:", err));
        }
        if (!current_handle && !isAuth) window.location.href = 'index.html';
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="terminal()" x-init="init()" class="bg-black text-gold p-6">
    <div class="scanline"></div>

    <template x-if="!authenticated">
        <div class="h-screen flex flex-col items-center justify-center p-10 text-center animate-in fade-in">
            <img src="logo.png" class="h-24 w-24 mb-10 gold-glow rounded-full border border-gold/20">
            <h2 class="text-[10px] font-black uppercase text-white mb-6">Directorate Secure Access</h2>
            <div class="w-full max-w-xs space-y-4">
                <input x-model="loginEmail" type="email" placeholder="DIRECTOR_ID..." class="w-full bg-white/5 border border-gold/20 p-5 rounded-2xl text-[10px] text-white terminal-font text-center outline-none">
                <input x-model="loginPass" type="password" placeholder="PROTOCOL_KEY..." class="w-full bg-white/5 border border-gold/20 p-5 rounded-2xl text-[10px] text-white terminal-font text-center outline-none">
                <button @click="verifyAccess()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-full">Authorize</button>
            </div>
        </div>
    </template>

    <template x-if="authenticated">
        <main class="max-w-2xl mx-auto space-y-6 pb-20 animate-in fade-in">
            <header class="flex justify-between items-center glass p-4 rounded-2xl">
                <div class="flex items-center gap-3">
                    <img src="logo.png" class="h-8 w-8 gold-glow rounded-full">
                    <h1 class="font-black text-white uppercase tracking-tighter italic">MOG_COMMAND</h1>
                </div>
                <button @click="logout()" class="text-red-500"><i data-lucide="power" size="18"></i></button>
            </header>

            <section class="grid grid-cols-3 gap-3">
                <div class="glass p-4 rounded-2xl text-center border-white/5">
                    <p class="text-[6px] uppercase text-gold/40 mb-1 font-black">Uplink Latency</p>
                    <p class="text-[11px] font-black text-green-400" x-text="latency + 'ms'"></p>
                </div>
                <div @click="confirmPurge()" class="glass p-4 rounded-2xl text-center border-gold/10 cursor-pointer">
                    <p class="text-[6px] uppercase text-red-500 mb-1 font-black italic">Wipe Grid</p>
                    <p class="text-[11px] font-black text-white" x-text="stats.messages + ' SIGS'"></p>
                </div>
                <div class="glass p-4 rounded-2xl text-center border-white/5">
                    <p class="text-[6px] uppercase text-gold/40 mb-1 font-black">DB Status</p>
                    <p class="text-[11px] font-black uppercase" :class="dbOnline ? 'text-green-500' : 'text-red-500'" x-text="dbOnline ? 'Online' : 'Error'"></p>
                </div>
            </section>

            <section class="glass p-8 rounded-[3rem] border-gold/20">
                <h3 class="text-[9px] font-black uppercase text-white mb-4 italic">Direct Dispatch</h3>
                <div class="space-y-3">
                    <input x-model="dmRecipient" placeholder="RECIPIENT_ID..." class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white outline-none uppercase">
                    <textarea x-model="dmContent" placeholder="INSTRUCTION..." class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white outline-none"></textarea>
                    <button @click="sendDM()" class="w-full py-4 bg-white text-black font-black text-[9px] uppercase rounded-full">Transmit Private Signal</button>
                </div>
            </section>

            <section class="glass p-8 rounded-[3rem] border-yellow-500/30">
                <h3 class="text-[9px] font-black uppercase text-yellow-500 mb-4 italic">Issue Signal Warning</h3>
                <div class="space-y-3">
                    <input x-model="warnRecipient" placeholder="OPERATIVE_ID..." class="w-full bg-black/40 border border-yellow-500/20 p-4 rounded-xl text-[9px] text-white outline-none uppercase">
                    <input x-model="warnMsg" placeholder="WARNING_REASON..." class="w-full bg-black/40 border border-yellow-500/20 p-4 rounded-xl text-[9px] text-white outline-none uppercase">
                    <button @click="sendWarning()" class="w-full py-4 bg-yellow-600 text-white font-black text-[9px] uppercase rounded-full">Transmit Yellow Alert</button>
                </div>
            </section>

            <section class="glass p-6 rounded-[2.5rem]">
                <h2 class="text-[9px] font-black uppercase text-white mb-4 italic tracking-widest">History</h2>
                <div class="space-y-2 max-h-[150px] overflow-y-auto pr-2 terminal-font text-[9px]">
                    <template x-for="log in logItems" :key="log.id">
                        <div class="p-3 bg-white/5 border-l border-gold/50 flex justify-between rounded-r-lg">
                            <span class="text-gold font-bold uppercase" x-text="'TO: ' + log.recipient"></span>
                            <span class="text-white/80" x-text="log.content"></span>
                        </div>
                    </template>
                </div>
            </section>
        </main>
    </template>

    <script>
        const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        function terminal() {
            return {
                authenticated: false, latency: 0, stats: { messages: 0 }, dbOnline: false, dmRecipient: '', dmContent: '', logItems: [], warnRecipient: '', warnMsg: '', loginEmail: '', loginPass: '',
                async init() {
                    if(sessionStorage.getItem('mog_terminal_auth') === 'true') { this.authenticated = true; this.runDiagnostics(); this.fetchLogs(); setInterval(() => this.runDiagnostics(), 30000); }
                    lucide.createIcons();
                },
                async runDiagnostics() {
                    const start = Date.now();
                    const { data, error } = await supabase.rpc('get_grid_stats');
                    this.latency = Date.now() - start; this.dbOnline = !error;
                    if (data) this.stats.messages = data.find(r => r.table_name === 'messages')?.row_count || 0;
                },
                verifyAccess() {
                    if(this.loginEmail === 'director.mog@gmail.com' && this.loginPass === '@MOGProtocol2026') {
                        this.authenticated = true; sessionStorage.setItem('mog_terminal_auth', 'true'); this.runDiagnostics(); this.fetchLogs();
                    }
                },
                async fetchLogs() { const { data } = await supabase.from('direct_messages').select('*').order('created_at', { ascending: false }).limit(10); this.logItems = data || []; },
                async sendDM() { if(!this.dmRecipient || !this.dmContent) return; await supabase.from('direct_messages').insert([{ recipient: this.dmRecipient.toUpperCase(), content: this.dmContent.toUpperCase() }]); this.dmRecipient = ''; this.dmContent = ''; this.fetchLogs(); },
                async sendWarning() { if(!this.warnRecipient) return; await supabase.from('warnings').insert([{ recipient: this.warnRecipient.toUpperCase(), message: this.warnMsg || 'PROTOCOL_VIOLATION' }]); this.warnRecipient = ''; this.warnMsg = ''; },
                async confirmPurge() { if(confirm("WIPE ALL MESSAGES?")) { await supabase.rpc('purge_grid_messages'); this.runDiagnostics(); } },
                logout() { sessionStorage.removeItem('mog_terminal_auth'); location.reload(); }
            }
        }
    </script>
</body>
</html>
