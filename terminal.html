<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>DIRECTORATE TERMINAL | MOG HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (!localStorage.getItem('mog_handle') && !sessionStorage.getItem('mog_terminal_auth')) {
            window.location.href = 'index.html';
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="terminal()" x-init="init()" x-cloak class="bg-black text-gold">
    <div class="scanline"></div>
    <template x-if="authenticated">
        <main class="min-h-screen p-6 space-y-6 max-w-2xl mx-auto">
            <header class="flex justify-between items-center glass p-4 rounded-2xl">
                <h1 class="font-black italic text-white uppercase tracking-tighter">MOG_COMMAND</h1>
                <button @click="logout()" class="text-red-500"><i data-lucide="log-out"></i></button>
            </header>

            <section class="grid grid-cols-2 gap-4">
                <button @click="toggle('livestream')" 
                        :class="isLive ? 'border-red-500 bg-red-500/20 shadow-[0_0_15px_rgba(239,68,68,0.4)]' : 'border-white/5 bg-white/5'" 
                        class="glass p-6 rounded-[2rem] text-center transition-all border group">
                    <i data-lucide="radio" :class="isLive ? 'text-red-500 animate-pulse' : 'text-zinc-600'" class="mx-auto mb-2" size="24"></i>
                    <p class="text-[8px] font-black uppercase text-white tracking-widest">Live Signal</p>
                </button>
                <button @click="triggerLockdown()" 
                        :class="isLockdown ? 'border-red-900 bg-red-900/50 shadow-[0_0_20px_rgba(139,0,0,0.3)]' : 'border-white/5 bg-white/5'" 
                        class="glass p-6 rounded-[2rem] text-center transition-all border group">
                    <i data-lucide="shield-alert" :class="isLockdown ? 'text-red-700' : 'text-zinc-600'" class="mx-auto mb-2" size="24"></i>
                    <p class="text-[8px] font-black uppercase text-white tracking-widest">Grid Lockdown</p>
                </button>
            </section>
        </main>
    </template>

    <script>
        function terminal() {
            return {
                authenticated: false, isLive: false, isLockdown: false, status: '',
                async init() {
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    if(sessionStorage.getItem('mog_terminal_auth') === 'true') {
                        this.authenticated = true;
                        const { data } = await this.supabase.from('system_status').select('*');
                        this.isLockdown = data?.find(r => r.id === 'lockdown')?.is_active;
                        this.isLive = data?.find(r => r.id === 'livestream')?.is_active;
                    }
                    lucide.createIcons();
                },
                async triggerLockdown() {
                    this.isLockdown = !this.isLockdown;
                    await this.supabase.from('system_status').update({ is_active: this.isLockdown }).eq('id', 'lockdown');
                    this.status = this.isLockdown ? "[LOCKDOWN_ACTIVE]" : "[LOCKDOWN_LIFTED]";
                },
                logout() { sessionStorage.removeItem('mog_terminal_auth'); location.reload(); }
            }
        }
    </script>
</body>
</html>
