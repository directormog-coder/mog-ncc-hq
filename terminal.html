<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>DIRECTORATE TERMINAL | MOG HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (!localStorage.getItem('mog_handle') && !sessionStorage.getItem('mog_terminal_auth')) {
            window.location.href = 'index.html';
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="terminal()" x-init="init()" class="bg-black text-gold">
    <div class="scanline"></div>

    <template x-if="!authenticated">
        <div class="h-screen flex flex-col items-center justify-center p-10 bg-black animate-in fade-in">
            <img src="logo.png" class="h-24 w-24 mb-10 gold-glow rounded-full">
            <div class="w-full max-w-xs space-y-4 text-center">
                <h2 class="text-[10px] font-black uppercase text-white">Directorate Secure Login</h2>
                <input x-model="loginEmail" type="email" placeholder="DIRECTOR_ID..." class="w-full bg-transparent border border-gold/20 p-5 rounded-2xl text-[10px] text-white terminal-font text-center outline-none">
                <input x-model="loginPass" type="password" placeholder="PROTOCOL_KEY..." class="w-full bg-transparent border border-gold/20 p-5 rounded-2xl text-[10px] text-white terminal-font text-center outline-none">
                <button @click="verifyAccess()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-full">Authorize Terminal</button>
            </div>
        </div>
    </template>

    <template x-if="authenticated">
        <main class="min-h-screen p-6 space-y-6 max-w-2xl mx-auto pb-24">
            <header class="flex justify-between items-center glass p-4 rounded-2xl border-gold/20">
                <div class="flex items-center gap-3">
                    <img src="logo.png" class="h-8 w-8 gold-glow rounded-full">
                    <h1 class="font-black italic text-white uppercase tracking-tighter">MOG_COMMAND</h1>
                </div>
                <button @click="logout()" class="text-red-500"><i data-lucide="log-out"></i></button>
            </header>

            <section class="grid grid-cols-2 gap-4">
                <button @click="triggerLockdown()" :class="isLockdown ? 'border-red-500 bg-red-500/20' : 'border-white/5 bg-white/5'" class="glass p-6 rounded-[2rem] border transition-all text-center">
                    <i data-lucide="shield-alert" class="mx-auto mb-2" :class="isLockdown ? 'text-red-500 animate-pulse' : ''"></i>
                    <p class="text-[8px] font-black uppercase text-white">Grid Lockdown</p>
                </button>
            </section>

            <section class="glass p-8 rounded-[3rem] border-gold/20">
                <h3 class="text-[9px] font-black uppercase text-white mb-4 italic">Direct Operative Uplink</h3>
                <div class="space-y-3">
                    <input x-model="dmRecipient" placeholder="RECIPIENT_ID..." class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white terminal-font outline-none uppercase">
                    <textarea x-model="dmContent" placeholder="INSTRUCTION..." class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white terminal-font outline-none"></textarea>
                    <button @click="sendDM()" class="w-full py-4 bg-white text-black font-black text-[9px] uppercase rounded-full">Transmit Private Signal</button>
                </div>
            </section>

            <section class="glass p-6 rounded-[2.5rem]">
                <h2 class="text-[9px] font-black uppercase text-white mb-4 italic">History</h2>
                <div class="space-y-2 max-h-[150px] overflow-y-auto pr-2 terminal-font text-[9px]">
                    <template x-for="log in logItems" :key="log.id">
                        <div class="p-3 bg-white/5 border-l border-gold/50 flex justify-between">
                            <span class="text-gold" x-text="log.recipient"></span>
                            <span class="text-white/80" x-text="log.content"></span>
                        </div>
                    </template>
                </div>
            </section>
        </main>
    </template>

    <script>
        const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        function terminal() {
            return {
                authenticated: false, isLockdown: false, dmRecipient: '', dmContent: '', logItems: [], loginEmail: '', loginPass: '',
                async init() {
                    if(sessionStorage.getItem('mog_terminal_auth') === 'true') {
                        this.authenticated = true;
                        this.fetchData();
                    }
                    lucide.createIcons();
                },
                verifyAccess() {
                    if(this.loginEmail === 'director.mog@gmail.com' && this.loginPass === '@MOGProtocol2026') {
                        this.authenticated = true;
                        sessionStorage.setItem('mog_terminal_auth', 'true');
                        this.fetchData();
                    }
                },
                async fetchData() {
                    const { data: logs } = await supabase.from('direct_messages').select('*').order('created_at', { ascending: false }).limit(10);
                    this.logItems = logs || [];
                    const { data } = await supabase.from('system_status').select('*').eq('id', 'lockdown').single();
                    if(data) this.isLockdown = data.is_active;
                },
                async triggerLockdown() {
                    this.isLockdown = !this.isLockdown;
                    await supabase.from('system_status').update({ is_active: this.isLockdown }).eq('id', 'lockdown');
                },
                async sendDM() {
                    if(!this.dmRecipient || !this.dmContent) return;
                    await supabase.from('direct_messages').insert([{ recipient: this.dmRecipient.toUpperCase(), content: this.dmContent.toUpperCase() }]);
                    this.dmRecipient = ''; this.dmContent = ''; this.fetchData();
                },
                logout() { sessionStorage.removeItem('mog_terminal_auth'); location.reload(); }
            }
        }
    </script>
</body>
</html>
