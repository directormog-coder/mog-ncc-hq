<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>DIRECTORATE TERMINAL | MOG HQ</title>
    <link rel="icon" type="image/png" href="1000219947.png">
    <link rel="apple-touch-icon" href="1000219947.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MOG TERMINAL">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(212, 175, 55, 0.15); }
        .gold-glow { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4)); }
        .terminal-font { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body x-data="terminal()" x-init="init()" class="p-6 pb-24">
    <header class="mb-10 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <img src="1000219947.png" class="h-12 w-12 gold-glow">
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter text-white">Directorate Terminal</h1>
                <p class="text-[7px] terminal-font text-gold/40 uppercase">UPTIME: <span x-text="uptime">0D 0H 0M</span></p>
            </div>
        </div>
        <button onclick="window.location.href='index.html'" class="p-3 glass rounded-2xl"><i data-lucide="log-out"></i></button>
    </header>

    <main class="space-y-6 max-w-xl mx-auto">
        <div class="glass p-6 rounded-[2.5rem] border-gold/10">
            <div class="flex items-center justify-between mb-4 px-2">
                <h2 class="text-[9px] font-black uppercase tracking-widest text-white">Live Operatives</h2>
                <span class="text-[8px] bg-gold/10 text-gold px-2 py-1 rounded-full font-bold" x-text="operatives.length">0</span>
            </div>
            <div class="space-y-2 max-h-32 overflow-y-auto pr-2">
                <template x-for="op in operatives">
                    <div class="flex justify-between items-center p-3 bg-white/5 rounded-2xl border border-white/5">
                        <span class="text-[10px] font-bold text-white uppercase" x-text="op.username"></span>
                        <span class="flex h-1.5 w-1.5 rounded-full bg-green-500 animate-pulse"></span>
                    </div>
                </template>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div @click="toggle('livestream')" :class="isLive ? 'border-red-500 bg-red-500/10' : 'border-white/5 bg-white/5'" class="glass p-6 rounded-[2rem] text-center cursor-pointer transition-all border">
                <i data-lucide="radio" :class="isLive ? 'text-red-500' : 'text-zinc-600'" class="mx-auto mb-2"></i>
                <p class="text-[8px] font-black uppercase text-white">Live Feed</p>
            </div>
            <div @click="toggle('lockdown')" :class="isLockdown ? 'border-red-700 bg-red-700/10' : 'border-white/5 bg-white/5'" class="glass p-6 rounded-[2rem] text-center cursor-pointer transition-all border">
                <i data-lucide="shield-alert" :class="isLockdown ? 'text-red-700' : 'text-zinc-600'" class="mx-auto mb-2"></i>
                <p class="text-[8px] font-black uppercase text-white">Lockdown</p>
            </div>
        </div>

        <div class="glass p-8 rounded-[3rem]">
            <h2 class="text-[10px] font-black uppercase mb-6 flex items-center gap-2 text-white"><i data-lucide="megaphone" size="14"></i> Global Push</h2>
            <div class="space-y-4">
                <input x-model="bTitle" placeholder="TITLE..." class="w-full bg-black border border-gold/20 p-4 rounded-2xl text-[10px] uppercase outline-none focus:border-gold transition-all">
                <textarea x-model="bMsg" placeholder="MESSAGE..." class="w-full bg-black border border-gold/20 p-4 rounded-2xl text-[10px] uppercase outline-none min-h-[100px] focus:border-gold transition-all"></textarea>
                <button @click="broadcast()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-full shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <img src="1000219947.png" class="h-4 w-4"> Transmit Signal
                </button>
                <p x-text="status" class="text-[7px] text-center uppercase opacity-50 tracking-widest"></p>
            </div>
                </div>
                
        <div class="glass p-8 rounded-[3rem] border-white/5">
            <h2 class="text-[10px] font-black uppercase mb-6 flex items-center gap-2 text-white"><i data-lucide="history" size="14"></i> Transmission Logs</h2>
            <div class="space-y-4 max-h-40 overflow-y-auto pr-2">
                <template x-for="log in broadcastLogs">
                    <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] font-black text-gold uppercase" x-text="log.title"></span>
                            <span class="text-[6px] terminal-font opacity-40" x-text="new Date(log.created_at).toLocaleTimeString()"></span>
                        </div>
                        <p class="text-[8px] text-zinc-400 uppercase leading-relaxed" x-text="log.message"></p>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <script>
        function terminal() {
            return {
                isLive: false, isLockdown: false, bTitle: '', bMsg: '', status: '', 
                operatives: [], broadcastLogs: [], uptime: '0D 0H 0M',
                async init() {
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    this.fetchSystem(); this.fetchPresence(); this.fetchLogs(); this.calculateUptime();
                    setInterval(() => { this.fetchPresence(); this.calculateUptime(); this.fetchLogs(); }, 30000);
                    lucide.createIcons();
                },
                async calculateUptime() {
                    const { data } = await this.supabase.from('system_status').select('updated_at').eq('id', 'system_uptime').single();
                    if(data) {
                        const diff = new Date() - new Date(data.updated_at);
                        const d = Math.floor(diff / 86400000);
                        const h = Math.floor((diff / 3600000) % 24);
                        const m = Math.floor((diff / 60000) % 60);
                        this.uptime = `${d}D ${h}H ${m}M`;
                    }
                },
                async fetchPresence() {
                    const { data } = await this.supabase.from('presence').select('username').gt('last_seen', new Date(Date.now() - 300000).toISOString());
                    this.operatives = data || [];
                },
                async fetchLogs() {
                    const { data } = await this.supabase.from('broadcast_logs').select('*').order('created_at', { ascending: false });
                    this.broadcastLogs = data || [];
                },
                async fetchSystem() {
                    const { data } = await this.supabase.from('system_status').select('*');
                    this.isLive = data.find(i => i.id === 'livestream')?.is_active;
                    this.isLockdown = data.find(i => i.id === 'lockdown')?.is_active;
                },
                async toggle(type) {
                    const val = type === 'livestream' ? !this.isLive : !this.isLockdown;
                    if(type === 'livestream') this.isLive = val; else this.isLockdown = val;
                    await this.supabase.from('system_status').update({ is_active: val }).eq('id', type);
                    lucide.createIcons();
                },
                async broadcast() {
                    if(!this.bTitle || !this.bMsg) return;
                    this.status = "TRANSMITTING SIGNAL...";
                    const res = await fetch('https://onesignal.com/api/v1/notifications', {
                        method: 'POST',
                        headers: { 'Authorization': 'Basic Mzg0ZmI0MjUtYzYxZi00ODlhLWE1YzEtODQ1ZDQ4MDZiZWM4', 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            app_id: "3ef253d3-a093-42f5-bc88-91dd7576cf34",
                            included_segments: ["Total Subscriptions"],
                            headings: { "en": this.bTitle.toUpperCase() },
                            contents: { "en": this.bMsg.toUpperCase() }
                        })
                    });
                    if(res.ok) {
                        await this.supabase.from('broadcast_logs').insert([{ title: this.bTitle.toUpperCase(), message: this.bMsg.toUpperCase() }]);
                        this.status = "SIGNAL BROADCASTED & LOGGED";
                        this.bTitle = ''; this.bMsg = '';
                        this.fetchLogs();
                    }
                }
            }
        }
    </script>
</body>
</html>
