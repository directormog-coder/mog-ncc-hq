<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>DIRECTORATE TERMINAL | MOG HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(212, 175, 55, 0.15); }
        .gold-glow { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4)); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="terminal()" x-init="init()" x-cloak>

    <template x-if="!authenticated">
        <div class="h-screen flex flex-col items-center justify-center p-10 bg-black">
            <img src="1000219947.png" class="h-24 w-24 mb-10 gold-glow">
            <div class="w-full max-w-xs space-y-4">
                <input x-model="loginEmail" type="email" placeholder="DIRECTOR_ID..." class="w-full bg-transparent border border-gold/20 p-4 rounded-2xl text-[10px] text-white outline-none text-center">
                <input x-model="loginPass" type="password" placeholder="PROTOCOL_KEY..." class="w-full bg-transparent border border-gold/20 p-4 rounded-2xl text-[10px] text-white outline-none text-center">
                <button @click="verifyAccess()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-full">Authorize Access</button>
            </div>
        </div>
    </template>

    <template x-if="authenticated">
        <div class="p-6 pb-24">
            <header class="mb-10 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <img src="1000219947.png" class="h-12 w-12 gold-glow">
                    <h1 class="text-xl font-black uppercase tracking-tighter text-white">Directorate Terminal</h1>
                </div>
                <button @click="logout()" class="p-3 glass rounded-2xl"><i data-lucide="log-out"></i></button>
            </header>

            <main class="space-y-6 max-w-xl mx-auto">
                <div class="glass p-6 rounded-[2.5rem] border-gold/10">
                    <h2 class="text-[9px] font-black uppercase text-white mb-4">Live Presence</h2>
                    <div class="space-y-2">
                        <template x-for="op in operatives">
                            <div class="flex justify-between items-center p-3 bg-white/5 rounded-2xl">
                                <span class="text-[10px] font-bold text-white uppercase" x-text="op.username"></span>
                                <span class="h-1.5 w-1.5 rounded-full bg-green-500 animate-pulse"></span>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button @click="toggle('livestream')" :class="isLive ? 'border-red-500 bg-red-500/10' : 'bg-white/5'" class="glass p-6 rounded-[2rem] border">
                        <i data-lucide="radio" :class="isLive ? 'text-red-500' : 'text-zinc-600'" class="mx-auto mb-2"></i>
                        <p class="text-[8px] font-black uppercase text-white">Live Feed</p>
                    </button>
                    <button @click="toggle('lockdown')" :class="isLockdown ? 'border-red-700 bg-red-700/10' : 'bg-white/5'" class="glass p-6 rounded-[2rem] border">
                        <i data-lucide="shield-alert" :class="isLockdown ? 'text-red-700' : 'text-zinc-600'" class="mx-auto mb-2"></i>
                        <p class="text-[8px] font-black uppercase text-white">Lockdown</p>
                    </button>
                </div>

                <div class="glass p-8 rounded-[3rem]">
                    <div class="space-y-4">
                        <input x-model="bTitle" placeholder="TITLE..." class="w-full bg-black border border-gold/20 p-4 rounded-2xl text-[10px] uppercase text-white">
                        <textarea x-model="bMsg" placeholder="MESSAGE..." class="w-full bg-black border border-gold/20 p-4 rounded-2xl text-[10px] uppercase text-white min-h-[100px]"></textarea>
                        <button @click="broadcast()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-full">Transmit Signal</button>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <script>
        function terminal() {
            return {
                authenticated: false, loginEmail: '', loginPass: '', isLive: false, isLockdown: false, operatives: [],
                async init() {
                    if(sessionStorage.getItem('mog_terminal_auth') === 'true') {
                        this.authenticated = true; this.setupSupabase();
                    }
                    lucide.createIcons();
                },
                verifyAccess() {
                    if(this.loginEmail === 'director.mog@gmail.com' && this.loginPass === '@MOGProtocol') {
                        this.authenticated = true; sessionStorage.setItem('mog_terminal_auth', 'true');
                        this.setupSupabase();
                    }
                },
                logout() { sessionStorage.removeItem('mog_terminal_auth'); location.reload(); },
                setupSupabase() {
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    this.fetchSystem(); this.fetchPresence();
                    setInterval(() => { this.fetchPresence(); }, 10000);
                },
                async fetchPresence() {
                    const { data } = await this.supabase.from('presence').select('username').gt('last_seen', new Date(Date.now() - 300000).toISOString());
                    this.operatives = data || [];
                },
                async fetchSystem() {
                    const { data } = await this.supabase.from('system_status').select('*');
                    this.isLive = data.find(i => i.id === 'livestream')?.is_active;
                    this.isLockdown = data.find(i => i.id === 'lockdown')?.is_active;
                },
                async toggle(type) {
                    const val = type === 'livestream' ? !this.isLive : !this.isLockdown;
                    if(type === 'livestream') this.isLive = val; else this.isLockdown = val;
                    await this.supabase.from('system_status').update({ is_active: val }).eq('id', type);
                    lucide.createIcons();
                },
                async broadcast() {
                    // OneSignal broadcast logic (already coded in index for reference)
                }
            }
        }
    </script>
</body>
</html>
