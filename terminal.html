<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>DIRECTORATE TERMINAL | MOG HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(212, 175, 55, 0.15); }
        .gold-glow { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4)); }
    </style>
</head>
<body x-data="terminal()" x-init="init()" class="p-6 pb-24">

    <header class="mb-10 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <img src="1000219947.png" class="h-12 w-12 gold-glow">
            <h1 class="text-xl font-black uppercase tracking-tighter text-white">Directorate Terminal</h1>
        </div>
        <button onclick="window.location.href='index.html'" class="p-3 glass rounded-2xl"><i data-lucide="log-out"></i></button>
    </header>

    <main class="space-y-6 max-w-xl mx-auto">
        <div class="grid grid-cols-1 gap-4">
            <div class="glass p-8 rounded-[3rem] flex items-center justify-between border-red-500/20">
                <div class="flex items-center gap-3"><i data-lucide="radio" class="text-red-500"></i><span class="text-[10px] font-black uppercase">Live Stream Signal</span></div>
                <button @click="toggle('livestream')" :class="isLive ? 'bg-red-600' : 'bg-zinc-800'" class="w-12 h-6 rounded-full relative transition-all">
                    <div :class="isLive ? 'left-7' : 'left-1'" class="absolute top-1 w-4 h-4 bg-white rounded-full transition-all"></div>
                </button>
            </div>
            
            <div class="glass p-8 rounded-[3rem] flex items-center justify-between border-red-900/40">
                <div class="flex items-center gap-3"><i data-lucide="shield-alert" class="text-red-700"></i><span class="text-[10px] font-black uppercase">Global Lockdown</span></div>
                <button @click="toggle('lockdown')" :class="isLockdown ? 'bg-red-700' : 'bg-zinc-800'" class="w-12 h-6 rounded-full relative transition-all">
                    <div :class="isLockdown ? 'left-7' : 'left-1'" class="absolute top-1 w-4 h-4 bg-white rounded-full transition-all"></div>
                </button>
            </div>
        </div>

        <div class="glass p-8 rounded-[3rem]">
            <h2 class="text-[10px] font-black uppercase mb-6 flex items-center gap-2"><i data-lucide="megaphone" size="14"></i> Global Push</h2>
            <div class="space-y-4">
                <input x-model="bTitle" placeholder="TITLE..." class="w-full bg-black border border-gold/20 p-4 rounded-2xl text-[10px] uppercase outline-none">
                <textarea x-model="bMsg" placeholder="MESSAGE..." class="w-full bg-black border border-gold/20 p-4 rounded-2xl text-[10px] uppercase outline-none min-h-[100px]"></textarea>
                <button @click="broadcast()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-full shadow-lg flex items-center justify-center gap-3">
                    <img src="1000219947.png" class="h-4 w-4"> Transmit Global Signal
                </button>
                <p x-text="status" class="text-[7px] text-center uppercase opacity-50"></p>
            </div>
        </div>
    </main>

    <script>
        function terminal() {
            return {
                isLive: false, isLockdown: false, bTitle: '', bMsg: '', status: '',
                async init() {
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    const { data } = await this.supabase.from('system_status').select('*');
                    this.isLive = data.find(i => i.id === 'livestream')?.is_active;
                    this.isLockdown = data.find(i => i.id === 'lockdown')?.is_active;
                    lucide.createIcons();
                },
                async toggle(type) {
                    const val = type === 'livestream' ? !this.isLive : !this.isLockdown;
                    if(type === 'livestream') this.isLive = val; else this.isLockdown = val;
                    await this.supabase.from('system_status').update({ is_active: val }).eq('id', type);
                },
                async broadcast() {
                    this.status = "TRANSMITTING...";
                    const res = await fetch('https://onesignal.com/api/v1/notifications', {
                        method: 'POST',
                        headers: { 'Authorization': 'Basic Mzg0ZmI0MjUtYzYxZi00ODlhLWE1YzEtODQ1ZDQ4MDZiZWM4', 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            app_id: "3ef253d3-a093-42f5-bc88-91dd7576cf34",
                            included_segments: ["Total Subscriptions"],
                            headings: { "en": this.bTitle },
                            contents: { "en": this.bMsg }
                        })
                    });
                    this.status = res.ok ? "SIGNAL SENT" : "UPLINK ERROR";
                }
            }
        }
    </script>
</body>
</html>
