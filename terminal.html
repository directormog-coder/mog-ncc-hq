<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>DIRECTORATE TERMINAL | MOG HQ</title>
    <link rel="icon" type="image/png" href="1000219947.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');</style>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="terminal()" x-init="init()" class="bg-black text-gold">

    <template x-if="!authenticated">
        <div class="h-screen flex flex-col items-center justify-center p-10 bg-black animate-in fade-in duration-700">
            <img src="1000219947.png" class="h-24 w-24 mb-10 gold-glow animate-pulse rounded-full">
            <div class="w-full max-w-xs space-y-4">
                <input x-model="loginEmail" type="email" placeholder="DIRECTOR_ID..." class="w-full glass p-5 rounded-2xl text-[10px] text-white outline-none terminal-font text-center">
                <input x-model="loginPass" type="password" placeholder="PROTOCOL_KEY..." class="w-full glass p-5 rounded-2xl text-[10px] text-white outline-none terminal-font text-center">
                <button @click="verifyAccess()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-full shadow-lg">Authorize Terminal</button>
            </div>
        </div>
    </template>

    <template x-if="authenticated">
        <div class="min-h-screen p-6 pb-32">
            <header class="mb-10 flex items-center justify-between sticky top-0 z-50 py-2 glass px-4 rounded-2xl border-none">
                <div class="flex items-center gap-4">
                    <img src="1000219947.png" class="h-12 w-12 gold-glow rounded-full">
                    <h1 class="text-xl font-black uppercase tracking-tighter text-white italic">MOG_COMMAND</h1>
                </div>
                <button @click="logout()" class="p-3 glass rounded-2xl border-red-900/40 text-red-500"><i data-lucide="log-out" size="18"></i></button>
            </header>

            <main class="space-y-6 max-w-2xl mx-auto">
                <section class="grid grid-cols-2 gap-4">
                    <button @click="toggle('livestream')" class="glass p-8 rounded-[2.5rem] border-white/5">
                        <i data-lucide="radio" :class="isLive ? 'text-red-500 animate-pulse' : 'text-zinc-600'" class="mx-auto mb-3" size="24"></i>
                        <p class="text-[9px] font-black uppercase text-white">Signal Status</p>
                    </button>
                    <button @click="toggle('lockdown')" class="glass p-8 rounded-[2.5rem] border-white/5">
                        <i data-lucide="shield-alert" :class="isLockdown ? 'text-red-700' : 'text-zinc-600'" class="mx-auto mb-3" size="24"></i>
                        <p class="text-[9px] font-black uppercase text-white">Grid Lock</p>
                    </button>
                </section>
            </main>

            <footer class="glass border-t border-gold/20 flex flex-col sm:flex-row justify-between items-center px-6 py-4 gap-4 sm:gap-0 fixed bottom-0 w-full left-0">
                <div class="flex flex-col items-center sm:items-start gap-1">
                    <p class="terminal-font text-[7px] font-black uppercase text-gold/60">© 2026 MINISTRY OF GROOVE</p>
                    <div class="flex gap-3 text-[6px] font-black uppercase tracking-widest text-gold/30">
                        <a href="tos.html" class="hover:text-gold transition-colors">Protocol TOS</a> | 
                        <a href="privacy.html" class="hover:text-gold transition-colors">Privacy Shield</a>
                    </div>
                </div>
                <div class="flex gap-6 text-white/40">
                    <a href="mailto:director.mog@gmail.com"><i data-lucide="mail" size="20"></i></a>
                    <a href="https://instagram.com/ministryofgroove_hq"><i data-lucide="instagram" size="20"></i></a>
                    <a href="https://tiktok.com/@ministryofgroove"><i data-lucide="music-2" size="20"></i></a>
                </div>
            </footer>
        </div>
    </template>
    <script>/* [Original terminal() JS logic here] */</script>
</body>
</html>
