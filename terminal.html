<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>DIRECTORATE TERMINAL | MOG HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (!localStorage.getItem('mog_handle') && !sessionStorage.getItem('mog_terminal_auth')) {
            window.location.href = 'index.html';
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="terminal()" x-init="init()" class="bg-black text-gold">
    <div class="scanline"></div>

    <template x-if="authenticated">
        <main class="min-h-screen p-6 space-y-6 max-w-2xl mx-auto pb-24">
            
            <header class="flex justify-between items-center glass p-4 rounded-2xl border-gold/20">
                <div class="flex items-center gap-3">
                    <img src="1000219947.png" class="h-8 w-8 gold-glow rounded-full">
                    <h1 class="font-black italic text-white uppercase tracking-tighter">MOG_COMMAND</h1>
                </div>
                <button @click="logout()" class="text-red-500"><i data-lucide="power" size="18"></i></button>
            </header>

            <section class="grid grid-cols-3 gap-3">
                <div class="glass p-4 rounded-2xl text-center">
                    <p class="text-[6px] uppercase text-gold/40">Traffic</p>
                    <p class="text-sm font-black text-white" x-text="stats.messages + ' SIGS'"></p>
                </div>
                <div class="glass p-4 rounded-2xl text-center">
                    <p class="text-[6px] uppercase text-gold/40">Latency</p>
                    <p class="text-sm font-black text-green-400" x-text="latency + 'ms'"></p>
                </div>
            </section>

            <section class="glass p-8 rounded-[3rem] border-gold/20">
                <h3 class="text-[9px] font-black uppercase text-white mb-4 italic">Direct Operative Uplink</h3>
                <div class="space-y-3">
                    <input x-model="dmRecipient" placeholder="RECIPIENT_ID..." class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white outline-none uppercase">
                    <textarea x-model="dmContent" placeholder="INSTRUCTION..." class="w-full bg-black/40 border border-gold/20 p-4 rounded-xl text-[9px] text-white outline-none"></textarea>
                    <button @click="sendDM()" class="w-full py-4 bg-white text-black font-black text-[9px] uppercase rounded-full">Transmit Private Signal</button>
                </div>
            </section>

            <section class="glass p-6 rounded-[2.5rem]">
                <h2 class="text-[9px] font-black uppercase text-white mb-4 italic">Instruction History</h2>
                <div class="space-y-2 max-h-[150px] overflow-y-auto pr-2 terminal-font text-[9px]">
                    <template x-for="log in logItems" :key="log.id">
                        <div class="p-3 bg-white/5 border-l border-gold/50 flex justify-between">
                            <span x-text="'TO: ' + log.recipient"></span>
                            <span x-text="log.content"></span>
                        </div>
                    </template>
                </div>
            </section>
        </main>
    </template>

    <script>
        function terminal() {
            return {
                authenticated: false, stats: { messages: 0 }, latency: 0, dmRecipient: '', dmContent: '', logItems: [],
                async init() {
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    if(sessionStorage.getItem('mog_terminal_auth') === 'true') {
                        this.authenticated = true;
                        this.fetchData();
                        setInterval(() => this.fetchData(), 15000);
                    }
                    lucide.createIcons();
                },
                async fetchData() {
                    const start = Date.now();
                    const { data: logs } = await this.supabase.from('direct_messages').select('*').order('created_at', { ascending: false }).limit(10);
                    this.logItems = logs || [];
                    const { data: stats } = await this.supabase.rpc('get_grid_stats');
                    this.latency = Date.now() - start;
                    if(stats) this.stats.messages = stats.find(r => r.table_name === 'messages')?.row_count || 0;
                },
                async sendDM() {
                    if(!this.dmRecipient || !this.dmContent) return;
                    await this.supabase.from('direct_messages').insert([{ recipient: this.dmRecipient.toUpperCase(), content: this.dmContent.toUpperCase() }]);
                    this.dmRecipient = ''; this.dmContent = ''; this.fetchData();
                },
                logout() { sessionStorage.removeItem('mog_terminal_auth'); location.reload(); }
            }
        }
    </script>
</body>
</html>
