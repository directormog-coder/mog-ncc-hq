<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.O.G. | Secure Access</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #0a0a0a; padding: 40px; border-radius: 20px; border: 1px solid #D4AF37; width: 85%; max-width: 360px; text-align: center; box-shadow: 0 0 30px rgba(212,175,55,0.1); }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; background: #D4AF37; color: black; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; transition: transform 0.2s; }
        .toggle { margin-top: 20px; font-size: 13px; color: #666; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="title" style="color:#D4AF37; margin-bottom: 25px; letter-spacing: 2px;">LOGIN</h2>
        <input type="email" id="email" placeholder="Operative Email">
        <input type="password" id="pass" placeholder="Secret Passkey">
        <button id="mainBtn" onclick="auth()">ACCESS GRID</button>
        <div class="toggle" id="toggleLink" onclick="toggleMode()">New Operative? Register Here</div>
        <p id="msg" style="font-size: 12px; margin-top: 15px;"></p>
    </div>

    <script>
        const SB_URL = "https://quzwygjbqpkuqjhrmsjp.supabase.co";
        const SB_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('title').textContent = isLogin ? 'LOGIN' : 'REGISTER';
            document.getElementById('mainBtn').textContent = isLogin ? 'ACCESS GRID' : 'CREATE ACCOUNT';
            document.getElementById('toggleLink').textContent = isLogin ? 'New Operative? Register Here' : 'Existing Operative? Login Here';
        }

        async function auth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const res = isLogin 
                ? await _supabase.auth.signInWithPassword({ email, password })
                : await _supabase.auth.signUp({ email, password });
            
            if (res.error) {
                document.getElementById('msg').style.color = 'red';
                document.getElementById('msg').textContent = res.error.message;
            } else {
                if (!isLogin) {
                    document.getElementById('msg').style.color = '#D4AF37';
                    document.getElementById('msg').textContent = "Registration Successful. Logging in...";
                    setTimeout(() => auth(), 1500);
                } else {
                    window.location.href = 'index.html';
                }
            }
        }
    </script>
</body>
</html>
