<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY VAULT | NCC DATA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');</style>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="vault()" x-init="init()" class="p-6 pb-[120px] bg-black text-gold">
    <header class="mb-10 flex items-center justify-between sticky top-0 z-50 py-2 glass px-4 rounded-2xl border-none">
        <button onclick="window.location.href='index.html'" class="p-3 glass rounded-2xl active:scale-90 transition-all"><i data-lucide="chevron-left" size="20"></i></button>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">The Vault</h1>
                <p class="text-[7px] uppercase tracking-[0.4em] text-gold/40 font-black">Data Repository</p>
            </div>
            <img src="logo.png" class="h-8 w-8 rounded-full border border-gold/20">
        </div>
    </header>

    <main class="space-y-6 max-w-xl mx-auto">
        <div class="glass p-6 rounded-[2.5rem] flex items-center justify-between">
            <div class="flex items-center gap-4"><i data-lucide="activity" class="text-white/20"></i><p class="text-[9px] font-black uppercase text-white">Uplink: Online</p></div>
            <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
        </div>

        <div x-show="isDirector" class="mt-8 space-y-4">
            <div class="flex items-center gap-2 px-2"><i data-lucide="download-cloud" size="14"></i><h3 class="text-[9px] font-black uppercase tracking-widest text-white">Directorate Data Export</h3></div>
            <button @click="exportData('messages')" class="w-full glass p-5 rounded-[2rem] border-gold/20 flex justify-between items-center"><span class="text-[8px] font-black uppercase text-white">Export Chat History</span><i data-lucide="file-text" size="14"></i></button>
        </div>

        <div class="glass p-8 rounded-[3rem] border-gold/10">
            <h3 class="text-[9px] font-black uppercase mb-4 text-white">Directorate Communications</h3>
            <button onclick="sendDispatch()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-2xl shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all"><i data-lucide="send" size="14"></i> Send Encrypted Dispatch</button>
        </div>
    </main>

    <footer class="glass border-t border-gold/20 flex flex-col sm:flex-row justify-between items-center px-6 py-4 gap-4 sm:gap-0 fixed bottom-0 w-full left-0">
        <div class="flex flex-col items-center sm:items-start gap-1">
            <p class="terminal-font text-[7px] font-black uppercase text-gold/60">© 2026 MINISTRY OF GROOVE</p>
            <div class="flex gap-3 text-[6px] font-black uppercase tracking-widest text-gold/30">
                <a href="tos.html" class="hover:text-gold transition-colors">Protocol TOS</a> | <a href="privacy.html" class="hover:text-gold transition-colors">Privacy Shield</a>
            </div>
        </div>
        <div class="flex gap-6 text-white/40">
            <a href="mailto:director.mog@gmail.com"><i data-lucide="mail" size="20"></i></a>
            <a href="https://instagram.com/ministryofgroove_hq" target="_blank"><i data-lucide="instagram" size="20"></i></a>
            <a href="https://tiktok.com/@ministryofgroove" target="_blank"><i data-lucide="music-2" size="20"></i></a>
            <a href="https://www.facebook.com/share/1HT1J3Kazp/" target="_blank"><i data-lucide="facebook" size="20"></i></a>
            <a href="https://www.youtube.com/@MinistryofGroove-m1q" target="_blank"><i data-lucide="youtube" size="20"></i></a>
        </div>
    </footer>

    <script>
        function vault() {
            return {
                isDirector: false,
                init() {
                    this.isDirector = localStorage.getItem('mog_handle') === 'DIRECTORATE';
                    const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
                    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
                    this.supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    lucide.createIcons();
                },
                async exportData(table) {
                    const { data } = await this.supabase.from(table).select('*');
                    if (!data || !data.length) return;
                    const csvContent = "data:text/csv;charset=utf-8," + Object.keys(data[0]).join(",") + "\n" + data.map(row => Object.values(row).join(",")).join("\n");
                    const link = document.createElement("a");
                    link.setAttribute("href", encodeURI(csvContent));
                    link.setAttribute("download", `MOG_${table.toUpperCase()}.csv`);
                    document.body.appendChild(link); link.click(); document.body.removeChild(link);
                }
            }
        }
        function sendDispatch() {
            const time = new Date().toLocaleTimeString('en-GB', { timeZone: 'Africa/Johannesburg' });
            window.location.href = `mailto:director.mog@gmail.com?subject=[MINISTRY_DISPATCH] - ${time} SAST&body=RECIPIENT: DIRECTORATE\nTIMESTAMP: ${time} SAST\nSEAL: [ logo.png ]\n\n[MESSAGE_BODY]`;
        }
    </script>
</body>
</html>
