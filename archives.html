<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY VAULT | NCC DATA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.95); border: 1px solid rgba(212, 175, 55, 0.15); }
        .terminal-text { font-family: 'JetBrains Mono', monospace; font-size: 9px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background: #10b981; box-shadow: 0 0 12px #10b981; }
    </style>
</head>
<body class="p-6">

    <header class="mb-8 flex items-center justify-between">
        <button onclick="window.location.href='index.html'" class="p-3 glass rounded-2xl"><i data-lucide="chevron-left"></i></button>
        <div class="text-right">
            <h1 class="text-xl font-black italic uppercase text-white">The Vault</h1>
            <p class="text-[7px] uppercase tracking-[0.4em] text-gold/40">Classified Data</p>
        </div>
    </header>

    <div class="space-y-4">
        <div class="glass p-6 rounded-[2rem] flex items-center justify-between">
            <p class="text-[10px] font-black uppercase tracking-widest text-white">Uplink Status</p>
            <span class="status-dot online"></span>
        </div>

        <div class="glass p-6 rounded-[2rem] bg-black/80">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="terminal" size="14"></i>
                <span class="text-[8px] font-bold uppercase tracking-[0.2em]">Frequency Stream</span>
            </div>
            <div id="terminal-feed" class="terminal-text space-y-2 opacity-70">
                <p>> Initializing Stream...</p>
                </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        async function initTerminal() {
            // 1. Get the last 3 messages immediately
            const { data } = await supabase.from('messages').select('content').order('created_at', { ascending: false }).limit(3);
            if (data) data.reverse().forEach(msg => addLog(msg.content));

            // 2. Subscribe to new messages in real-time
            supabase.channel('vault-stream').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                addLog(payload.new.content);
            }).subscribe();
        }

        function addLog(text) {
            const feed = document.getElementById('terminal-feed');
            const log = document.createElement('p');
            log.innerHTML = `> REC_TRANS: <span class="text-white">${text}</span>`;
            feed.appendChild(log);
            if (feed.children.length > 4) feed.removeChild(feed.children[0]);
        }

        initTerminal();
    </script>
</body>
</html>
