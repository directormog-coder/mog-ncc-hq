<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY VAULT | NCC DATA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.95); border: 1px solid rgba(212, 175, 55, 0.15); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #10b981; box-shadow: 0 0 12px #10b981; }
    </style>
</head>
<body class="p-6 pb-24">
    <header class="mb-10 flex items-center justify-between">
        <button onclick="window.location.href='index.html'" class="p-3 glass rounded-2xl active:scale-90 transition-all">
            <i data-lucide="chevron-left" size="20"></i>
        </button>
        <div class="text-right">
            <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">The Vault</h1>
            <p class="text-[7px] uppercase tracking-[0.4em] text-gold/40 font-black">Secure Data Repository</p>
        </div>
    </header>

    <div class="space-y-6 max-w-xl mx-auto">
        <div class="glass p-6 rounded-[2.5rem] flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i data-lucide="activity" class="text-white/20"></i>
                <p class="text-[9px] font-black uppercase text-white">Uplink Status: Online</p>
            </div>
            <span class="status-dot animate-pulse"></span>
        </div>

        <div class="glass p-8 rounded-[3rem] border-gold/10">
            <h3 class="text-[9px] font-black uppercase mb-4 text-white">Directorate Communications</h3>
            <button onclick="sendDispatch()" class="w-full py-5 bg-gold text-black font-black text-[10px] uppercase rounded-2xl shadow-lg flex items-center justify-center gap-2">
                <i data-lucide="send" size="14"></i> Send Encrypted Dispatch
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function sendDispatch() {
            const email = "director.mog@gmail.com";
            const time = new Date().toLocaleTimeString('en-GB', { timeZone: 'Africa/Johannesburg' });
            const subject = encodeURIComponent(`[MINISTRY_DISPATCH] - ${time} SAST`);
            const body = encodeURIComponent("RECIPIENT: DIRECTORATE\nHANDLE: director.mog@gmail.com\nTIMESTAMP: " + time + " SAST\nSEAL: [ 1000219947.png ]");
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
    </script>
</body>
</html>
