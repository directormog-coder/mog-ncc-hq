<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>MINISTRY VAULT | NCC DATA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        :root { --gold: #D4AF37; --noir: #050505; }
        body { background: var(--noir); color: var(--gold); font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.95); border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; transition: all 0.5s ease; }
        .online { background: #10b981; box-shadow: 0 0 12px #10b981; }
        .offline { background: #ef4444; box-shadow: 0 0 12px #ef4444; }
        .pulse { animate: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-6 selection:bg-gold selection:text-black">

    <header class="mb-10 flex items-center justify-between">
        <button onclick="window.location.href='index.html'" class="p-3 glass rounded-2xl hover:border-gold/50 transition-all active:scale-90">
            <i data-lucide="chevron-left" size="20"></i>
        </button>
        <div class="text-right">
            <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">The Vault</h1>
            <p class="text-[7px] uppercase tracking-[0.4em] text-gold/40 font-bold">Classified Ministry Data</p>
        </div>
    </header>

    <div class="space-y-4">
        <div class="glass p-6 rounded-[2rem] flex items-center justify-between">
            <div class="flex items-center gap-5">
                <div class="p-3 bg-zinc-900 rounded-2xl">
                    <i data-lucide="rss" size="24" class="text-white/20"></i>
                </div>
                <div>
                    <p class="text-[10px] font-black uppercase tracking-widest text-white">Database Uplink</p>
                    <p id="status-text" class="text-[7px] opacity-40 font-bold mt-1 uppercase italic tracking-tighter">Establishing Handshake...</p>
                </div>
            </div>
            <span id="connection-dot" class="status-dot offline pulse"></span>
        </div>

        <div class="glass p-6 rounded-[2rem] flex items-center justify-between group hover:bg-gold/5 transition-all">
            <div class="flex items-center gap-5">
                <div class="p-3 bg-blue-500/10 rounded-2xl text-blue-400">
                    <i data-lucide="cpu" size="24"></i>
                </div>
                <div>
                    <p class="text-[10px] font-black uppercase tracking-widest text-white">System Architecture</p>
                    <p class="text-[7px] opacity-40 font-bold mt-1 uppercase">Supabase • OneSignal • Vercel</p>
                </div>
            </div>
            <i data-lucide="chevron-right" size="14" class="opacity-10 group-hover:opacity-100 transition-opacity"></i>
        </div>

        <div class="glass p-6 rounded-[2rem] flex items-center justify-between group hover:bg-gold/5 transition-all">
            <div class="flex items-center gap-5">
                <div class="p-3 bg-red-500/10 rounded-2xl text-red-500">
                    <i data-lucide="shield-alert" size="24"></i>
                </div>
                <div>
                    <p class="text-[10px] font-black uppercase tracking-widest text-white">NCC Protocol 54</p>
                    <p class="text-[7px] opacity-40 font-bold mt-1 uppercase">Encrypted Handshake Active</p>
                </div>
            </div>
            <i data-lucide="lock" size="14" class="text-gold/20"></i>
        </div>
    </div>

    <div class="mt-12 p-6 glass rounded-[2rem] text-center opacity-30">
        <p class="text-[6px] uppercase tracking-[0.5em] font-black italic">Unauthorized access is prohibited by Ministry Decree</p>
    </div>

    <script>
        lucide.createIcons();

        async function checkConnection() {
            const SB_URL = 'https://quzwygjbqpkuqjhrmsjp.supabase.co';
            const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1end5Z2picXBrdXFqaHJtc2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTM0MDksImV4cCI6MjA4Nzg4OTQwOX0.1EVJRlSelXQOPHLX_Y7YsWxzVUmx8s7keRVpqWdXsPU';
            const supabase = window.supabase.createClient(SB_URL, SB_KEY);
            const dot = document.getElementById('connection-dot');
            const statusText = document.getElementById('status-text');

            try {
                // Test a simple select to check the heartbeat
                const { error } = await supabase.from('messages').select('id').limit(1);
                
                if (error) throw error;

                dot.classList.remove('offline', 'pulse');
                dot.classList.add('online');
                statusText.innerText = "Status: Frequency Locked (Online)";
                statusText.classList.add('text-green-500/50');
            } catch (err) {
                dot.classList.add('offline');
                statusText.innerText = "Status: Uplink Interrupted (Offline)";
                statusText.classList.add('text-red-500/50');
                console.error('Connection Failed:', err);
            }
        }

        checkConnection();
    </script>
</body>
</html>
